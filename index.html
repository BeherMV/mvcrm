<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVCRM — Corretora de Plano de Saúde</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00C9A7;--blue:#2563EB;--mid:#1DA4D4;
  --teal-d:#00A88A;--blue-d:#1D4ED8;
  --bg:#F0F4F8;--card:#fff;--border:#E2E8F0;--border2:#CBD5E1;
  --text1:#0F172A;--text2:#475569;--text3:#94A3B8;
  --green:#10B981;--red:#EF4444;--amber:#F59E0B;--purple:#8B5CF6;--orange:#F97316;
  --sidebar-w:220px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh}

/* ── LOGIN ── */
#s-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#E0FAF5 0%,#EFF6FF 50%,#F0F4F8 100%)}
.login-card{background:var(--card);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.1);padding:44px 40px;width:100%;max-width:420px}
.brand-wrap{text-align:center;margin-bottom:32px}
.brand-logo{display:inline-flex;align-items:flex-end;gap:1px;margin-bottom:8px}
.bm{font-size:44px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,#00C9A7,#1DA4D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.bv{font-size:44px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,#1DA4D4,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.bcrm{font-size:15px;font-weight:700;color:var(--blue);margin-left:3px;padding-bottom:8px}
.brand-tag{font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;font-weight:500}
.lfield{margin-bottom:18px}
.lfield label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.lfield input{width:100%;height:46px;padding:0 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text1);background:#FAFBFC;outline:none;transition:all .2s}
.lfield input:focus{border-color:var(--mid);background:#fff;box-shadow:0 0 0 4px rgba(29,164,212,.08)}
.btn-login{width:100%;height:46px;background:linear-gradient(135deg,#00C9A7,#2563EB);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn-login:hover{opacity:.92}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.lerr{background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:10px;padding:10px 14px;font-size:13px;color:#991B1B;margin-top:12px;display:none}

/* ── APP SHELL ── */
#s-app{display:none;min-height:100vh}
.app-layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;transition:transform .3s}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo{display:flex;align-items:flex-end;gap:1px}
.sb-m{font-size:22px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#00C9A7,#1DA4D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.sb-v{font-size:22px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#1DA4D4,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.sb-crm{font-size:11px;font-weight:700;color:var(--blue);margin-left:2px;padding-bottom:4px}
.sb-user{padding:14px 18px;border-bottom:1px solid var(--border)}
.sb-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-role{font-size:11px;color:var(--text3);margin-top:1px}
.sb-nav{flex:1;padding:12px 10px;overflow-y:auto}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 4px}
.sb-btn{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:none;cursor:pointer;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;text-align:left;margin-bottom:2px}
.sb-btn:hover{background:var(--bg);color:var(--text1)}
.sb-btn.active{background:linear-gradient(135deg,rgba(0,201,167,.1),rgba(37,99,235,.1));color:var(--mid);font-weight:600}
.sb-btn svg{flex-shrink:0;opacity:.7}
.sb-btn.active svg{opacity:1}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.sb-footer{padding:12px 18px;border-top:1px solid var(--border)}
.btn-sair{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500;transition:all .15s}
.btn-sair:hover{background:var(--bg);border-color:var(--red);color:var(--red)}

/* ── MAIN ── */
.main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-title{font-size:15px;font-weight:700;color:var(--text1)}
.topbar-right{display:flex;align-items:center;gap:10px}
.notif-btn{position:relative;width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.notif-btn:hover{background:var(--bg);border-color:var(--mid);color:var(--mid)}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--card)}

/* ── PAGES ── */
.page{display:none;padding:24px;flex-direction:column;gap:20px}
.page.active{display:flex}

/* ── COMPONENTS ── */
.metrics{display:grid;gap:14px}
.m4{grid-template-columns:repeat(4,minmax(0,1fr))}
.m3{grid-template-columns:repeat(3,minmax(0,1fr))}
.m2{grid-template-columns:repeat(2,minmax(0,1fr))}
.metric{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--blue))}
.metric-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.metric-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.metric-val{font-size:26px;font-weight:800;color:var(--text1);line-height:1}
.metric-sub{font-size:12px;color:var(--text2);margin-top:5px;display:flex;align-items:center;gap:4px}
.up{color:var(--green)}.dn{color:var(--red)}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:700;color:var(--text1)}
.card-sub{font-size:12px;color:var(--text3);margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* BOTÕES */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-pri{background:linear-gradient(135deg,var(--teal),var(--mid));color:#fff}
.btn-pri:hover{opacity:.9}
.btn-sec{background:var(--bg);border:1.5px solid var(--border);color:var(--text2)}
.btn-sec:hover{border-color:var(--mid);color:var(--mid)}
.btn-danger{background:#FEE2E2;border:1.5px solid #FCA5A5;color:#991B1B}
.btn-sm{padding:5px 12px;font-size:12px}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.p-ok{background:#D1FAE5;color:#065F46}
.p-wn{background:#FEF3C7;color:#92400E}
.p-lw{background:#FEE2E2;color:#991B1B}
.p-info{background:#EFF6FF;color:#1E40AF}
.p-tl{background:#E0FAF5;color:#065F46}
.p-purple{background:#EDE9FE;color:#4C1D95}
.p-gray{background:#F1F5F9;color:#475569}
.p-mid{background:#E0F2FE;color:#0369A1}

/* STATUS LEADS */
.s-nrab{background:#FEE2E2;color:#991B1B}
.s-nrm{background:#FEF3C7;color:#92400E}
.s-anal{background:#EFF6FF;color:#1E40AF}
.s-pb{background:#E0FAF5;color:#065F46}
.s-ardd{background:#EDE9FE;color:#4C1D95}
.s-prop{background:#D1FAE5;color:#065F46}
.s-neg{background:#F1F5F9;color:#475569}

/* ROWS */
.row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);transition:background .1s;border-radius:8px}
.row:hover{background:var(--bg);padding-left:8px;padding-right:8px}
.row:last-child{border-bottom:none}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.ri{flex:1;min-width:0}
.rn{font-size:13px;font-weight:600;color:var(--text1)}
.rm{font-size:11px;color:var(--text2);margin-top:2px}
.pw{flex:1;min-width:80px}
.pl{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pt{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s}

/* FUNIL */
.funil-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}
.funil-col{display:flex;flex-direction:column;gap:0}
.funil-header{padding:10px 12px;border-radius:10px 10px 0 0;text-align:center}
.funil-header-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.funil-header-count{font-size:18px;font-weight:800;margin-top:2px}
.funil-body{background:var(--bg);border-radius:0 0 10px 10px;padding:8px;min-height:120px;display:flex;flex-direction:column;gap:6px}
.funil-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .15s}
.funil-card:hover{border-color:var(--mid);transform:translateY(-1px)}
.funil-card-name{font-size:12px;font-weight:600;color:var(--text1);margin-bottom:4px}
.funil-card-info{font-size:11px;color:var(--text2)}
.funil-card-val{font-size:12px;font-weight:700;color:var(--mid);margin-top:4px}

/* METAS */
.meta-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.meta-bar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.meta-bar-title{font-size:13px;font-weight:700;color:var(--text1);display:flex;align-items:center;gap:8px}
.meta-bar-pct{font-size:20px;font-weight:800}
.meta-track{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:8px}
.meta-fill{height:100%;border-radius:5px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.meta-foot{display:flex;justify-content:space-between}
.meta-foot span{font-size:12px;color:var(--text2)}

/* DU BARS */
.du-wrap{display:flex;gap:3px;align-items:flex-end}
.du-bar{flex:1;border-radius:2px 2px 0 0;min-width:0;transition:all .3s}

/* NOTIFICAÇÕES */
.notif-panel{position:fixed;top:52px;right:0;width:360px;height:calc(100vh - 52px);background:var(--card);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column}
.notif-panel.open{transform:translateX(0)}
.notif-panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-panel-body{flex:1;overflow-y:auto;padding:8px}
.notif-item{display:flex;gap:12px;padding:12px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:background .1s}
.notif-item:hover{background:var(--bg)}
.notif-item.unread{background:#EFF6FF}
.notif-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-body{flex:1}
.notif-text{font-size:13px;color:var(--text1);line-height:1.4}
.notif-time{font-size:11px;color:var(--text3);margin-top:3px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.2)}
.modal-box h3{font-size:17px;font-weight:800;margin-bottom:20px;color:var(--text1)}
.mfield{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.mfield label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.mfield input,.mfield select,.mfield textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:#FAFBFC;color:var(--text1);font-size:13px;outline:none;font-family:inherit;transition:all .2s}
.mfield input,.mfield select{height:42px}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--mid);background:#fff;box-shadow:0 0 0 4px rgba(29,164,212,.08)}
.mfield .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.alert-ok{display:none;background:#D1FAE5;border:1.5px solid #6EE7B7;border-radius:10px;padding:10px 14px;font-size:13px;color:#065F46;margin-bottom:12px}
.alert-err{display:none;background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:10px;padding:10px 14px;font-size:13px;color:#991B1B;margin-bottom:12px}

/* AGENDA */
.agenda-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
.agenda-day{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px;min-height:80px;cursor:pointer;transition:all .15s}
.agenda-day:hover{border-color:var(--mid)}
.agenda-day.today{border-color:var(--mid);background:#E0F2FE}
.agenda-day-num{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:4px}
.agenda-day.today .agenda-day-num{color:var(--mid)}
.agenda-event{font-size:10px;background:linear-gradient(135deg,var(--teal),var(--mid));color:#fff;border-radius:4px;padding:2px 5px;margin-bottom:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agenda-day-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

/* TABELA */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:2px solid var(--border);text-align:left;background:var(--bg)}
.tbl th:first-child{border-radius:8px 0 0 0}
.tbl th:last-child{border-radius:0 8px 0 0}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg)}

/* FILTROS */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s}
.filter-btn.on{background:var(--mid);border-color:var(--mid);color:#fff}
.filter-btn:hover:not(.on){border-color:var(--mid);color:var(--mid)}

/* RANKING */
.rank-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:12px;margin-bottom:8px;background:var(--bg);border:1.5px solid var(--border);transition:all .15s}
.rank-row:hover{border-color:var(--mid)}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff}
.rank-2{background:linear-gradient(135deg,#94A3B8,#64748B);color:#fff}
.rank-3{background:linear-gradient(135deg,#F97316,#EA580C);color:#fff}
.rank-n{background:var(--border);color:var(--text3)}

.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--mid);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0;font-weight:600}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-left:0}
  .funil-grid{grid-template-columns:repeat(2,1fr)}
  .m4{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
}
@media(max-width:480px){
  .m4{grid-template-columns:1fr}
  .m3{grid-template-columns:1fr}
  .m2{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login">
  <div class="login-card">
    <div class="brand-wrap">
      <div class="brand-logo"><span class="bm">M</span><span class="bv">V</span><span class="bcrm">CRM</span></div>
      <div class="brand-tag">Corretora de plano de saúde</div>
    </div>
    <div class="lfield"><label>E-mail</label><input type="email" id="l-email" placeholder="seu@mvcrm.com.br" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="lfield"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="lerr" id="l-err"></div>
  </div>
</div>

<!-- APP -->
<div id="s-app">
  <div class="app-layout">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sb-brand">
        <div class="sb-logo"><span class="sb-m">M</span><span class="sb-v">V</span><span class="sb-crm">CRM</span></div>
      </div>
      <div class="sb-user">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="sb-av av" id="sb-av" style="width:38px;height:38px;font-size:13px;background:#E0FAF5;color:#065F46"></div>
          <div style="min-width:0">
            <div class="sb-name" id="sb-name"></div>
            <div class="sb-role" id="sb-role"></div>
          </div>
        </div>
      </div>
      <div class="sb-nav" id="sb-nav"></div>
      <div class="sb-footer">
        <button class="btn-sair" onclick="doLogout()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;margin-right:6px;vertical-align:-2px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sair do sistema
        </button>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main-content">
      <div class="topbar">
        <div>
          <div class="topbar-title" id="topbar-title">Dashboard</div>
        </div>

async function carregarNotificacoes(){
  const{data}=await sb.from('notificacoes').select('*').eq('para_usuario',CU.id).order('criada_em',{ascending:false}).limit(30)
  const unread=(data||[]).filter(n=>!n.lida).length
  $('notif-dot').style.display=unread>0?'block':'none'
  const cores={sucesso:'#D1FAE5',info:'#EFF6FF',alerta:'#FEF3C7',urgente:'#FEE2E2'}
  const icones={sucesso:'✓',info:'ℹ',alerta:'⚠',urgente:'🔴'}
  $('notif-list').innerHTML=(data||[]).length?(data||[]).map(n=>`
    <div class="notif-item${n.lida?'':' unread'}" onclick="lerNotif('${n.id}')">
      <div class="notif-icon" style="background:${cores[n.tipo]||'#EFF6FF'}">
        <span style="font-size:14px">${icones[n.tipo]||'ℹ'}</span>
      </div>
      <div class="notif-body">
        <div class="notif-text"><strong>${n.titulo}</strong>${n.mensagem?'<br><span style="color:var(--text2);font-size:12px">'+n.mensagem+'</span>':''}</div>
        <div class="notif-time">${new Date(n.criada_em).toLocaleString('pt-BR')}</div>
      </div>
    </div>`).join(''):'<div class="empty">Nenhuma notificação</div>'
}

window.lerNotif=async(id)=>{
  await sb.from('notificacoes').update({lida:true}).eq('id',id)
  await carregarNotificacoes()
}
window.marcarTodasLidas=async()=>{
  await sb.from('notificacoes').update({lida:true}).eq('para_usuario',CU.id)
  await carregarNotificacoes()
}

async function notificarTodos(titulo,mensagem,tipo='info'){
  const{data:users}=await sb.from('usuarios').select('id')
  if(!users?.length)return
  const notifs=users.map(u=>({para_usuario:u.id,titulo,mensagem,tipo,lida:false}))
  await sb.from('notificacoes').insert(notifs)
}

async function verificarMeta(consultorId,consultorNome,equipeId,equipeName){
  const m=mes(),a=ano()
  const[metaRes,resultRes]=await Promise.all([
    sb.from('metas_mensais').select('meta_vendas').eq('consultor_id',consultorId).eq('mes',m).eq('ano',a).maybeSingle(),
    sb.from('leads').select('valor_meta').eq('consultor_id',consultorId).eq('mes_fechamento',m).eq('ano_fechamento',a).eq('status','Proposta')
  ])
  const metaVnd=metaRes.data?.meta_vendas||17000
  const realizado=(resultRes.data||[]).reduce((s,l)=>s+Number(l.valor_meta||0),0)
  if(realizado>=metaVnd){
    await notificarTodos(`🏆 Meta batida! ${consultorNome}`,`${consultorNome} atingiu a meta de ${fmt(metaVnd)} neste mês!`,'sucesso')
  }
  if(equipeId){
    const{data:cons}=await sb.from('usuarios').select('id').eq('equipe_id',equipeId).eq('perfil','consultor')
    if(cons?.length){
      const ids=cons.map(c=>c.id)
      const{data:metasEq}=await sb.from('metas_mensais').select('meta_vendas').in('consultor_id',ids).eq('mes',m).eq('ano',a)
      const metaEqTotal=(metasEq||[]).reduce((s,x)=>s+Number(x.meta_vendas||17000),0)
      const{data:leadEq}=await sb.from('leads').select('valor_meta').in('consultor_id',ids).eq('mes_fechamento',m).eq('ano_fechamento',a).eq('status','Proposta')
      const realEq=(leadEq||[]).reduce((s,l)=>s+Number(l.valor_meta||0),0)
      if(realEq>=metaEqTotal&&metaEqTotal>0){
        await notificarTodos(`🏆 Equipe ${equipeName} bateu a meta!`,`A equipe ${equipeName} atingiu ${fmt(metaEqTotal)} neste mês! Parabéns a todos!`,'sucesso')
      }
    }
  }
}

window.navTo=(id,btn,title)=>{
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'))

    'p-home':loadCoHome,'p-leads':loadLeads,'p-funil':loadFunil,'p-agenda':loadAgenda,

  }

}

async function loadCoHome(){
  const el=$('p-home');if(!el)return
  el.innerHTML='<div class="loading">Carregando seu painel...</div>'
  const m=mes(),a=ano()
  const[metaRes,leadsRes,agendaRes]=await Promise.all([
    sb.from('metas_mensais').select('*').eq('consultor_id',CU.id).eq('mes',m).eq('ano',a).maybeSingle(),
    sb.from('leads').select('*').eq('consultor_id',CU.id),

  ])
  const metaVnd=metaRes.data?.meta_vendas||17000
  const metaCot=metaRes.data?.meta_cotacoes||70

  const fechados=leads.filter(l=>l.status==='Proposta'&&l.mes_fechamento===m&&l.ano_fechamento===a)
  const realizado=fechados.reduce((s,l)=>s+Number(l.valor_meta||0),0)
  const cotacoes=leads.filter(l=>l.mes_cotacao===m&&l.ano_cotacao===a).length
  const vndPct=metaVnd>0?Math.min(Math.round(realizado/metaVnd*100),100):0
  const cotPct=metaCot>0?Math.min(Math.round(cotacoes/metaCot*100),100):0
  const vndEsp=Math.round(metaVnd*duHoje/duTotal)
  const cotEsp=Math.round(metaCot*duHoje/duTotal)
  const vndOk=realizado>=vndEsp,cotOk=cotacoes>=cotEsp
  const hoje=leads.filter(l=>l.followup_date===new Date().toISOString().split('T')[0])

  el.innerHTML=`
    <div style="background:linear-gradient(135deg,#E0FAF5,#EFF6FF);border:1.5px solid #93C5FD;border-radius:14px;padding:16px 20px;display:flex;align-items:flex-start;gap:14px">

        <div class="meta-bar-wrap">
          <div class="meta-bar-head">
            <div class="meta-bar-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${vndOk?'#00C9A7':'#EF4444'}" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>

          <div class="meta-foot"><span>${cotacoes} de ${metaCot} cotações</span><span style="color:${cotOk?'#059669':'#DC2626'};font-weight:600">${cotOk?'▲ acima':'▼ abaixo'} do esperado (${cotEsp})</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Régua de dias úteis</span><span style="font-size:12px;color:var(--text3)">dia ${duHoje} de ${duTotal}</span></div>
        <div class="du-wrap" id="du-home" style="height:64px;margin-bottom:8px"></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:16px"><span style="font-size:11px;color:var(--text3)">1</span><span style="font-size:13px;font-weight:700;color:var(--mid)">${pctDU}% do mês</span><span style="font-size:11px;color:var(--text3)">${duTotal}</span></div>
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px">Próximos agendamentos</div>
        ${(agendaRes.data||[]).length?agendaRes.data.map(ag=>`

    <div class="card">
      <table class="tbl">
        <thead><tr><th>Nome</th><th>Empresa</th><th>Telefone</th><th>Canal</th><th>Status</th><th>Follow-up</th><th>Ações</th></tr></thead>

          <tr>
            <td><strong>${l.nome}</strong></td>

window.filterLeads=(s,btn)=>{
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on')
  renderLeadsView(LEADS_CACHE,s)
}

window.novoLead=()=>{
  $('mod-lead-title').textContent='Novo lead'
  $('ml-id').value=''
  ;['ml-nome','ml-empresa','ml-tel','ml-obs','ml-valor','ml-vidas','ml-motivo'].forEach(id=>{if($(id))$(id).value=''})
  $('ml-status').value='Não responderam AB'
  $('ml-canal').value='WhatsApp'
  $('ml-fechamento').style.display='none'
  $('ml-negativa').style.display='none'
  $('ml-ok').style.display='none';$('ml-err').style.display='none'
  openModal('mod-lead')
}

window.editarLead=async(id)=>{
  const l=LEADS_CACHE.find(x=>x.id===id);if(!l)return
  $('mod-lead-title').textContent='Editar lead'
  $('ml-id').value=l.id
  $('ml-nome').value=l.nome||''
  $('ml-empresa').value=l.empresa||''
  $('ml-tel').value=l.telefone||''
  $('ml-canal').value=l.canal||'WhatsApp'
  $('ml-status').value=l.status||'Não responderam AB'
  $('ml-obs').value=l.observacoes||''
  $('ml-fechamento').style.display=l.status==='Proposta'?'block':'none'
  $('ml-negativa').style.display=l.status==='Negativa'?'block':'none'
  if(l.status==='Proposta'){$('ml-tipo').value=l.tipo||'PF';$('ml-operadora').value=l.operadora||'Unimed';$('ml-valor').value=l.valor||'';$('ml-vidas').value=l.vidas||1}
  if(l.status==='Negativa') $('ml-motivo').value=l.motivo_perda||''
  $('ml-ok').style.display='none';$('ml-err').style.display='none'
  openModal('mod-lead')
}

window.salvarLead=async()=>{
  const id=$('ml-id').value
  const nome=$('ml-nome').value.trim(),status=$('ml-status').value
  $('ml-err').style.display='none'
  if(!nome){$('ml-err').textContent='Informe o nome do lead.';$('ml-err').style.display='block';return}
  const amanha=new Date();amanha.setDate(amanha.getDate()+1)
  const followup=amanha.toISOString().split('T')[0]
  const m=mes(),a=ano()
  let dados={
    nome,empresa:$('ml-empresa').value.trim(),telefone:$('ml-tel').value.trim(),
    canal:$('ml-canal').value,status,observacoes:$('ml-obs').value.trim(),
    followup_date:status!=='Proposta'&&status!=='Negativa'?followup:null,
    consultor_id:CU.id
  }
  if(status==='Proposta'){
    const tipo=$('ml-tipo').value,op=$('ml-operadora').value
    const val=Number($('ml-valor').value)||0
    const valMeta=calcMeta(val,tipo,op)
    dados={...dados,tipo,operadora:op,valor:val,valor_meta:valMeta,vidas:Number($('ml-vidas').value)||1,
      mes_fechamento:m,ano_fechamento:a,mes_cotacao:m,ano_cotacao:a}
  }
  if(status==='Negativa') dados={...dados,motivo_perda:$('ml-motivo').value.trim()}
  let error
  if(id){const r=await sb.from('leads').update(dados).eq('id',id);error=r.error}
  else{const r=await sb.from('leads').insert({...dados,mes_cotacao:m,ano_cotacao:a});error=r.error}
  if(error){$('ml-err').textContent='Erro: '+error.message;$('ml-err').style.display='block';return}
  if(status==='Proposta'&&CU.equipe_id){
    const{data:eq}=await sb.from('equipes').select('nome').eq('id',CU.equipe_id).single()
    await verificarMeta(CU.id,CU.nome,CU.equipe_id,eq?.nome||'')
  }
  $('ml-ok').textContent=id?'Lead atualizado!':'Lead cadastrado!';$('ml-ok').style.display='block'
  setTimeout(()=>{closeModal('mod-lead');loadLeads();loadCoHome()},1400)
}

window.abrirLead=id=>editarLead(id)

  const el=$('p-leads');if(!el)return
  const{data:hist}=await sb.from('historico_leads').select('*').eq('lead_id',id).order('criado_em',{ascending:false})
  const cores={Ligação:'#2563EB','E-mail':'#F59E0B',Reunião:'#8B5CF6',Proposta:'#F97316',Fechamento:'#00C9A7',Nota:'#94A3B8','Follow-up':'#1DA4D4'}
  el.innerHTML=`
    <button class="back-btn" onclick="loadLeads()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Voltar para leads
    </button>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:18px;font-weight:800">${nome}</div>
      <button class="btn btn-pri" onclick="novaInteracaoLead('${id}')">+ Registrar interação</button>
    </div>
    <div class="card">
      ${hist?.length?hist.map(h=>`
        <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
          <div class="dot" style="background:${cores[h.tipo]||'#94A3B8'};margin-top:5px;width:10px;height:10px"></div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${h.tipo}</div><div style="font-size:12px;color:var(--text2);margin-top:3px">${h.observacao||''}</div><div style="font-size:11px;color:var(--text3);margin-top:4px">${new Date(h.criado_em).toLocaleString('pt-BR')}</div></div>
        </div>`).join(''):'<div class="empty">Nenhuma interação registrada</div>'}

}

window.novaInteracaoLead=async(leadId)=>{
  const tipo=prompt('Tipo: Ligação, E-mail, Reunião, Proposta, Fechamento, Follow-up, Nota');if(!tipo)return
  const obs=prompt('Observação:');
  await sb.from('historico_leads').insert({lead_id:leadId,consultor_id:CU.id,tipo,observacao:obs})
  const l=LEADS_CACHE.find(x=>x.id===leadId)
  if(l) verHistoricoLead(leadId,l.nome)
}

async function loadAgenda(){
  const el=$('p-agenda');if(!el)return
  el.innerHTML='<div class="loading">Carregando agenda...</div>'
  const hoje=new Date()
  const ano=hoje.getFullYear(),mes=hoje.getMonth()
  const inicioMes=new Date(ano,mes,1).toISOString().split('T')[0]
  const fimMes=new Date(ano,mes+1,0).toISOString().split('T')[0]
  const[agRes,leadsRes]=await Promise.all([
    sb.from('agendamentos').select('*').eq('consultor_id',CU.id).gte('data',inicioMes).lte('data',fimMes).order('data'),
    sb.from('leads').select('id,nome').eq('consultor_id',CU.id).order('nome')
  ])
  AGENDA_EVENTS=agRes.data||[]
  // Popular select de leads no modal
  const lo=$('ma-lead');if(lo){lo.innerHTML='<option value="">Nenhum</option>'+(leadsRes.data||[]).map(l=>`<option value="${l.id}">${l.nome}</option>`).join('')}

  const diasSemana=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
  const primeiroDia=new Date(ano,mes,1).getDay()
  const totalDias=new Date(ano,mes+1,0).getDate()
  const nomeMes=hoje.toLocaleString('pt-BR',{month:'long',year:'numeric'})

  let calHTML=diasSemana.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:var(--text3);padding:6px 0;text-transform:uppercase;letter-spacing:.5px">${d}</div>`).join('')
  for(let i=0;i<primeiroDia;i++) calHTML+=`<div></div>`
  for(let d=1;d<=totalDias;d++){
    const dateStr=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const isToday=d===hoje.getDate()
    const evs=AGENDA_EVENTS.filter(e=>e.data===dateStr)
    calHTML+=`<div class="agenda-day${isToday?' today':''}" onclick="diaSelecionado('${dateStr}')">
      <div class="agenda-day-num">${d}</div>
      ${evs.slice(0,2).map(e=>`<div class="agenda-event">${e.hora?.slice(0,5)} ${e.titulo}</div>`).join('')}
      ${evs.length>2?`<div style="font-size:10px;color:var(--text3)">+${evs.length-2} mais</div>`:''}
    </div>`
  }

  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:20px;font-weight:800;text-transform:capitalize">${nomeMes}</div>
      <button class="btn btn-pri" onclick="novoAgendamento()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo agendamento
      </button>
    </div>
    <div class="card">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px">${calHTML}</div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Próximos agendamentos</span></div>
      <div id="agenda-lista">
        ${AGENDA_EVENTS.filter(e=>e.data>=new Date().toISOString().split('T')[0]).slice(0,10).map(e=>`
          <div class="row">
            <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--teal),var(--mid));display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
              <span style="font-size:14px;font-weight:800;color:#fff;line-height:1">${new Date(e.data+'T12:00').getDate()}</span>
              <span style="font-size:9px;color:rgba(255,255,255,.8);text-transform:uppercase">${new Date(e.data+'T12:00').toLocaleString('pt-BR',{month:'short'})}</span>
            </div>
            <div class="ri"><div class="rn">${e.titulo}</div><div class="rm">${e.hora?.slice(0,5)} · ${e.tipo}</div></div>
            <button class="btn btn-danger btn-sm" onclick="excluirAgendamento('${e.id}')">Excluir</button>
          </div>`).join('')||'<div class="empty">Nenhum agendamento futuro</div>'}
      </div>
    </div>
  `
}

window.diaSelecionado=(date)=>{
  const evs=AGENDA_EVENTS.filter(e=>e.data===date)
  if(evs.length){alert(evs.map(e=>`${e.hora?.slice(0,5)} — ${e.titulo} (${e.tipo})`).join('\n'))}
  else{$('ma-data').value=date;openModal('mod-agenda')}
}

window.novoAgendamento=()=>{
  $('ma-titulo').value='';$('ma-obs').value=''
  $('ma-data').value=new Date().toISOString().split('T')[0]
  $('ma-hora').value='09:00'
  $('ma-ok').style.display='none';$('ma-err').style.display='none'
  openModal('mod-agenda')
}

window.salvarAgendamento=async()=>{
  const titulo=$('ma-titulo').value.trim(),data=$('ma-data').value,hora=$('ma-hora').value
  $('ma-err').style.display='none'
  if(!titulo||!data){$('ma-err').textContent='Informe título e data.';$('ma-err').style.display='block';return}
  const{error}=await sb.from('agendamentos').insert({titulo,lead_id:$('ma-lead').value||null,data,hora,tipo:$('ma-tipo').value,observacao:$('ma-obs').value.trim(),consultor_id:CU.id})
  if(error){$('ma-err').textContent='Erro: '+error.message;$('ma-err').style.display='block';return}
  $('ma-ok').textContent='Agendamento salvo!';$('ma-ok').style.display='block'
  setTimeout(()=>{closeModal('mod-agenda');loadAgenda()},1400)
}

window.excluirAgendamento=async(id)=>{
  if(!confirm('Excluir este agendamento?'))return
  await sb.from('agendamentos').delete().eq('id',id)
  loadAgenda()
}

window.loadSvHistMes=async(a,btn)=>{

  const cons=await getConsultoresEq()
  const ids=cons.map(c=>c.id)
  const{data:metas}=await sb.from('metas_mensais').select('*').in('consultor_id',ids).eq('ano',a)
  const{data:leads}=ids.length?await sb.from('leads').select('*').in('consultor_id',ids).eq('ano_fechamento',a).eq('status','Proposta'):{data:[]}

  el.innerHTML=`<div style="overflow-x:auto"><table class="tbl">

    <tbody>${mesesDoAno.map(m=>{
      const cells=cons.map(c=>{
        const meta=(metas||[]).find(x=>x.consultor_id===c.id&&x.mes===m)||{meta_vendas:17000}
        const real=(leads||[]).filter(l=>l.consultor_id===c.id&&l.mes_fechamento===m).reduce((s,l)=>s+Number(l.valor_meta||0),0)
        const pct=meta.meta_vendas>0?Math.round(real/meta.meta_vendas*100):0
        return{real,pct}
      })
      const totalReal=cells.reduce((s,c)=>s+c.real,0)
      return`<tr>
        <td><strong>${String(m).padStart(2,'0')}/${a}</strong></td>
        ${cells.map(c=>`<td><span style="font-weight:600;color:${c.pct>=100?'#00C9A7':c.pct>=64?'#F59E0B':'var(--text3)'}">${fmt(c.real)}</span> <span style="font-size:11px;color:var(--text3)">${c.pct}%</span></td>`).join('')}
        <td><strong>${fmt(totalReal)}</strong></td>
      </tr>`}).join('')}
    </tbody>
  </table></div>`
}

        <div style="position:relative;height:320px"><canvas id="c-ma-rank"></canvas></div>
      </div>
    </div>
  `
  setTimeout(()=>{
    const top10=ranking.slice(0,10)
    const cores=['#F59E0B','#94A3B8','#F97316','#00C9A7','#1DA4D4','#2563EB','#8B5CF6','#10B981','#EF4444','#EC4899']
    newChart('c-ma-rank',{type:'bar',data:{labels:top10.map(r=>r.c.nome.split(' ')[0]),datasets:[{data:top10.map(r=>r.real),backgroundColor:cores,borderRadius:8,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'R$ '+c.raw.toLocaleString('pt-BR')}}},scales:{x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94A3B8',font:{size:11},callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}}}}})
  },100)
}

async function loadMaHistorico(){
  const el=$('p-ma-historico');if(!el)return
  el.innerHTML='<div class="loading">Carregando histórico...</div>'
  const anos=[ano(),ano()-1]
  el.innerHTML=`
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">Histórico consolidado</div>
    <div class="filter-bar" id="ma-hist-filter">
      ${anos.map((a,i)=>`<button class="filter-btn${i===0?' on':''}" onclick="loadMaHistAno(${a},this)">${a}</button>`).join('')}
    </div>
    <div id="ma-hist-content"><div class="loading">Carregando...</div></div>
  `
  await loadMaHistAno(ano(),document.querySelector('#ma-hist-filter .filter-btn'))
}

window.loadMaHistAno=async(a,btn)=>{
  if(btn){document.querySelectorAll('#ma-hist-filter .filter-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on')}
  const[eqRes,leadsRes]=await Promise.all([
    sb.from('equipes').select('*'),
    sb.from('leads').select('valor_meta,consultor_id,mes_fechamento,status').eq('status','Proposta').eq('ano_fechamento',a)
  ])
  const equipes=eqRes.data||[];const leads=leadsRes.data||[]
  const{data:cons}=await sb.from('usuarios').select('id,equipe_id').eq('perfil','consultor')
  const meses=Array.from({length:12},(_,i)=>i+1)
  const el=$('ma-hist-content');if(!el)return
  el.innerHTML=`<div style="overflow-x:auto"><table class="tbl">
    <thead><tr><th>Mês</th>${equipes.map(eq=>`<th>${eq.nome}</th>`).join('')}<th>Total</th></tr></thead>
    <tbody>${meses.map(m=>{
      const cells=equipes.map(eq=>{
        const idsEq=(cons||[]).filter(c=>c.equipe_id===eq.id).map(c=>c.id)
        const real=leads.filter(l=>idsEq.includes(l.consultor_id)&&l.mes_fechamento===m).reduce((s,l)=>s+Number(l.valor_meta||0),0)
        const pct=eq.meta_mensal>0?Math.round(real/eq.meta_mensal*100):0
        return{real,pct}
      })
      const total=cells.reduce((s,c)=>s+c.real,0)
      return`<tr>
        <td><strong>${String(m).padStart(2,'0')}/${a}</strong></td>
        ${cells.map(c=>`<td><span style="font-weight:600;color:${c.pct>=100?'#00C9A7':c.pct>=64?'#F59E0B':'var(--text3)'}">${fmt(c.real)}</span></td>`).join('')}
        <td><strong style="color:var(--mid)">${fmt(total)}</strong></td>
      </tr>`}).join('')}
    </tbody>
  </table></div>`
}

async function loadMaMetas(){
  const el=$('p-ma-metas');if(!el)return
  el.innerHTML='<div class="loading">Carregando...</div>'
  const{data:equipes}=await sb.from('equipes').select('*')
  el.innerHTML=`
    <div style="font-size:20px;font-weight:800;margin-bottom:20px">Metas globais das equipes</div>
    <div class="card">
      <table class="tbl">
        <thead><tr><th>Equipe</th><th>Meta mensal (R$)</th><th>Ação</th></tr></thead>
        <tbody>
          ${(equipes||[]).map(eq=>`<tr>
            <td><strong>${eq.nome}</strong></td>
            <td><input type="number" id="meq-${eq.id}" value="${eq.meta_mensal||0}" style="width:140px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit"></td>
            <td><button class="btn btn-pri btn-sm" onclick="salvarMetaEquipe('${eq.id}')">Salvar</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `
}

window.salvarMetaEquipe=async(eqId)=>{
  const val=Number($(`meq-${eqId}`).value)||0
  await sb.from('equipes').update({meta_mensal:val}).eq('id',eqId)
  alert('Meta da equipe salva!')
}

window.$=$
</script>
