<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVCRM - Corretora de Plano de Saúde</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#00C9A7;--blue:#2563EB;--mid:#1DA4D4;
  --bg:#F0F4F8;--card:#fff;--border:#E2E8F0;
  --text1:#0F172A;--text2:#475569;--text3:#94A3B8;
  --green:#10B981;--red:#EF4444;--amber:#F59E0B;--purple:#8B5CF6;
  --sidebar-w:224px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh}
#s-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#E0FAF5 0%,#EFF6FF 60%,#F0F4F8 100%)}
.login-card{background:var(--card);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.1);padding:44px 40px;width:100%;max-width:420px}
.brand-wrap{text-align:center;margin-bottom:32px}
.brand-logo{display:inline-flex;align-items:flex-end;gap:1px;margin-bottom:8px}
.bm{font-size:44px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,#00C9A7,#1DA4D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.bv{font-size:44px;font-weight:800;letter-spacing:-2px;background:linear-gradient(135deg,#1DA4D4,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.bcrm{font-size:15px;font-weight:700;color:var(--blue);margin-left:3px;padding-bottom:8px}
.brand-tag{font-size:11px;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;font-weight:500}
.lfield{margin-bottom:18px}
.lfield label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.lfield input{width:100%;height:46px;padding:0 16px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text1);background:#FAFBFC;outline:none;transition:all .2s}
.lfield input:focus{border-color:var(--mid);background:#fff;box-shadow:0 0 0 4px rgba(29,164,212,.08)}
.btn-login{width:100%;height:46px;background:linear-gradient(135deg,#00C9A7,#2563EB);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.btn-login:hover{opacity:.92}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.lerr{background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:10px;padding:10px 14px;font-size:13px;color:#991B1B;margin-top:12px;display:none}
#s-app{display:none;min-height:100vh}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;overflow-y:auto}
.sb-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-logo{display:flex;align-items:flex-end;gap:1px}
.sb-m{font-size:22px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#00C9A7,#1DA4D4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.sb-v{font-size:22px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#1DA4D4,#2563EB);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.sb-crm{font-size:11px;font-weight:700;color:var(--blue);margin-left:2px;padding-bottom:4px}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--border)}
.sb-av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-role{font-size:11px;color:var(--text3);margin-top:1px}
.sb-nav{flex:1;padding:10px 8px}
.sb-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 4px}
.sb-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 10px;border:none;background:none;cursor:pointer;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);transition:all .15s;text-align:left;margin-bottom:2px}
.sb-btn:hover{background:var(--bg);color:var(--text1)}
.sb-btn.active{background:linear-gradient(135deg,rgba(0,201,167,.12),rgba(37,99,235,.12));color:var(--mid);font-weight:600}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border)}
.btn-sair{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:none;cursor:pointer;font-size:13px;color:var(--text2);font-weight:500;transition:all .15s}
.btn-sair:hover{border-color:var(--red);color:var(--red)}
.main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.notif-btn{position:relative;width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.notif-btn:hover{border-color:var(--mid);color:var(--mid)}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--card);display:none}
.page{display:none;padding:24px;flex-direction:column;gap:18px}
.page.active{display:flex}
.metrics{display:grid;gap:14px}
.m4{grid-template-columns:repeat(4,minmax(0,1fr))}
.m3{grid-template-columns:repeat(3,minmax(0,1fr))}
.m2{grid-template-columns:repeat(2,minmax(0,1fr))}
.metric{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--blue))}
.metric-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.metric-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.metric-val{font-size:26px;font-weight:800;color:var(--text1);line-height:1}
.metric-sub{font-size:12px;color:var(--text2);margin-top:4px}
.up{color:var(--green)}.dn{color:var(--red)}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:700;color:var(--text1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;white-space:nowrap}
.btn-pri{background:linear-gradient(135deg,var(--teal),var(--mid));color:#fff}
.btn-pri:hover{opacity:.9}
.btn-sec{background:var(--bg);border:1.5px solid var(--border);color:var(--text2)}
.btn-sec:hover{border-color:var(--mid);color:var(--mid)}
.btn-danger{background:#FEE2E2;border:1.5px solid #FCA5A5;color:#991B1B}
.btn-sm{padding:5px 12px;font-size:12px}
.pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.p-ok{background:#D1FAE5;color:#065F46}.p-wn{background:#FEF3C7;color:#92400E}.p-lw{background:#FEE2E2;color:#991B1B}
.p-info{background:#EFF6FF;color:#1E40AF}.p-tl{background:#E0FAF5;color:#065F46}.p-gray{background:#F1F5F9;color:#475569}
.row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);transition:all .1s;border-radius:6px}
.row:hover{background:var(--bg);padding-left:8px;padding-right:8px}
.row:last-child{border-bottom:none}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.ri{flex:1;min-width:0}
.rn{font-size:13px;font-weight:600;color:var(--text1)}
.rm{font-size:11px;color:var(--text2);margin-top:2px}
.pw{flex:1;min-width:80px}
.pl{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pt{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .6s}
.funil-grid{display:grid;grid-template-columns:repeat(7,minmax(130px,1fr));gap:10px}
.funil-col{}
.funil-header{padding:10px 12px;border-radius:10px 10px 0 0;text-align:center}
.funil-header-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.funil-header-count{font-size:18px;font-weight:800;margin-top:2px}
.funil-body{background:var(--bg);border-radius:0 0 10px 10px;padding:8px;min-height:100px;display:flex;flex-direction:column;gap:6px}
.funil-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .15s}
.funil-card:hover{border-color:var(--mid);transform:translateY(-1px)}
.funil-card-name{font-size:12px;font-weight:600;color:var(--text1);margin-bottom:3px}
.funil-card-info{font-size:10px;color:var(--text2)}
.funil-card-val{font-size:11px;font-weight:700;color:var(--mid);margin-top:3px}
.meta-bar-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:12px}
.meta-bar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.meta-bar-title{font-size:13px;font-weight:700;color:var(--text1)}
.meta-bar-pct{font-size:20px;font-weight:800}
.meta-track{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin-bottom:8px}
.meta-fill{height:100%;border-radius:5px;transition:width .8s}
.meta-foot{display:flex;justify-content:space-between}
.meta-foot span{font-size:12px;color:var(--text2)}
.du-wrap{display:flex;gap:3px;align-items:flex-end}
.du-bar{flex:1;border-radius:2px 2px 0 0;min-width:0}
.notif-panel{position:fixed;top:52px;right:0;width:360px;height:calc(100vh - 52px);background:var(--card);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column}
.notif-panel.open{transform:translateX(0)}
.notif-panel-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-panel-body{flex:1;overflow-y:auto;padding:8px}
.notif-item{display:flex;gap:12px;padding:12px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:background .1s}
.notif-item:hover{background:var(--bg)}
.notif-item.unread{background:#EFF6FF}
.notif-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.notif-text{font-size:13px;color:var(--text1);line-height:1.4}
.notif-time{font-size:11px;color:var(--text3);margin-top:3px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:200;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(4px)}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}}
.modal-box{border-radius:20px 20px 0 0;max-height:92vh;width:100%}
@media(min-width:600px){.modal-box{border-radius:16px;max-width:500px}}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:16px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 80px rgba(0,0,0,.2)}
.modal-box h3{font-size:17px;font-weight:800;margin-bottom:20px}
.mfield{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.mfield label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.mfield input,.mfield select,.mfield textarea{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:#FAFBFC;color:var(--text1);font-size:13px;outline:none;font-family:inherit;transition:all .2s}
.mfield input,.mfield select{height:42px}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--mid);background:#fff;box-shadow:0 0 0 4px rgba(29,164,212,.08)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}
.alert-ok{display:none;background:#D1FAE5;border:1.5px solid #6EE7B7;border-radius:10px;padding:10px 14px;font-size:13px;color:#065F46;margin-bottom:12px}
.alert-err{display:none;background:#FEE2E2;border:1.5px solid #FCA5A5;border-radius:10px;padding:10px 14px;font-size:13px;color:#991B1B;margin-bottom:12px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.filter-bar::-webkit-scrollbar{height:3px}
.filter-bar::-webkit-scrollbar-track{background:transparent}
.filter-bar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s}
.filter-btn.on{background:var(--mid);border-color:var(--mid);color:#fff}
.filter-btn:hover:not(.on){border-color:var(--mid);color:var(--mid)}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;margin-bottom:8px;background:var(--bg);border:1.5px solid var(--border)}
.rank-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff}
.rank-2{background:linear-gradient(135deg,#94A3B8,#64748B);color:#fff}
.rank-3{background:linear-gradient(135deg,#F97316,#EA580C);color:#fff}
.rank-n{background:var(--border);color:var(--text3)}
.agenda-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.agenda-day{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px;min-height:72px;cursor:pointer;transition:all .15s}
.agenda-day:hover{border-color:var(--mid)}
.agenda-day.today{border-color:var(--mid);background:#E0F2FE}
.agenda-day-num{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:3px}
.agenda-day.today .agenda-day-num{color:var(--mid)}
.agenda-event{font-size:10px;background:linear-gradient(135deg,var(--teal),var(--mid));color:#fff;border-radius:4px;padding:2px 5px;margin-bottom:2px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:2px solid var(--border);text-align:left;background:var(--bg)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg)}
.search-input{height:38px;padding:0 14px 0 36px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--card);outline:none;transition:all .2s;width:220px}
.search-input:focus{border-color:var(--mid);box-shadow:0 0 0 4px rgba(29,164,212,.08)}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3)}
.equipe-meta-box{background:linear-gradient(135deg,rgba(0,201,167,.08),rgba(37,99,235,.08));border:1.5px solid rgba(29,164,212,.2);border-radius:14px;padding:16px 20px}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:14px}
.empty{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--mid);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;padding:0;font-weight:600}
@media(max-width:900px){
  .m4{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .funil-grid{grid-template-columns:repeat(2,minmax(130px,1fr))}
  .sidebar{transform:translateX(-100%);transition:transform .3s ease;z-index:200}
  .sidebar.mob-open{transform:translateX(0)}
  .main-content{margin-left:0!important}
  .topbar{padding:0 14px}
  .page{padding:16px}
  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
  .mob-overlay.active{display:block}
  .ham-btn{display:flex!important}
  .notif-panel{width:100vw}
}
@media(max-width:480px){
  .m4{grid-template-columns:1fr}
  .m3{grid-template-columns:1fr}
  .m2{grid-template-columns:1fr}
  .metrics{gap:10px}
  .metric{padding:14px 16px}
  .metric-val{font-size:22px}
  .card{padding:16px}
  .funil-grid{grid-template-columns:1fr}
  .rank-row{flex-wrap:wrap;gap:8px}
  .tbl th,.tbl td{padding:8px 10px;font-size:12px}
  .btn{padding:7px 12px;font-size:12px}
  .modal-box{padding:20px}
}
</style>


<div id="s-login">
  <div class="login-card">
    <div class="brand-wrap">
      <div class="brand-logo"><span class="bm">M</span><span class="bv">V</span><span class="bcrm">CRM</span></div>
      <div class="brand-tag">Corretora de plano de saude</div>
    </div>
    <div class="lfield"><label>E-mail</label><input type="email" id="l-email" placeholder="seu@mvcrm.com.br" onkeydown="if(event.key===&#39;Enter&#39;)doLogin()"></div>
    <div class="lfield"><label>Senha</label><input type="password" id="l-senha" placeholder="••••••••" onkeydown="if(event.key===&#39;Enter&#39;)doLogin()"></div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="lerr" id="l-err"></div>
  </div>
</div>

<div id="s-app">
  <div class="app-layout">
    <div class="sidebar" id="sidebar">
      <div class="sb-brand">
        <div class="sb-logo"><span class="sb-m">M</span><span class="sb-v">V</span><span class="sb-crm">CRM</span></div>
      </div>
      <div class="sb-user">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="sb-av av" id="sb-av" style="width:38px;height:38px;font-size:13px;background:#E0FAF5;color:#065F46"></div>
          <div style="min-width:0"><div class="sb-name" id="sb-name"></div><div class="sb-role" id="sb-role"></div></div>
        </div>
      </div>
      <div class="sb-nav" id="sb-nav"></div>
      <div class="sb-footer">
        <button class="btn-sair" onclick="doLogout()">↩ Sair do sistema</button>
      </div>
    </div>
    <div class="main-content">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="ham-btn" id="ham-btn" onclick="toggleSidebar()" style="display:none;width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:none;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex-shrink:0">
            <span style="display:block;width:16px;height:2px;background:var(--text2);border-radius:1px"></span>
            <span style="display:block;width:16px;height:2px;background:var(--text2);border-radius:1px"></span>
            <span style="display:block;width:12px;height:2px;background:var(--text2);border-radius:1px"></span>
          </button>
          <div class="topbar-title" id="topbar-title">Dashboard</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <button class="notif-btn" onclick="toggleNotif()" id="notif-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 01-3.46 0"></path></svg>
            <span class="notif-dot" id="notif-dot"></span>
          </button>
        </div>
      </div>
      <div id="pages-wrap"></div>
    </div>

function getDiasUteisDoMes(ano,mes){
  const total=new Date(ano,mes,0).getDate()
  let du=0
  for(let d=1;d<=total;d++){const dia=new Date(ano,mes-1,d).getDay();if(dia!==0&&dia!==6)du++}
  return du
}
function getDiasUteisAte(ano,mes,dia){
  let du=0
  for(let d=1;d<=dia;d++){const dw=new Date(ano,mes-1,d).getDay();if(dw!==0&&dw!==6)du++}
  return du
}

function mostrarToast(titulo,mensagem,tipo){
  const cores={sucesso:'linear-gradient(135deg,#00C9A7,#10B981)',info:'linear-gradient(135deg,#1DA4D4,#2563EB)',alerta:'linear-gradient(135deg,#F59E0B,#D97706)',urgente:'linear-gradient(135deg,#EF4444,#DC2626)'}
  const ic={sucesso:'🏆',info:'ℹ️',alerta:'⚠️',urgente:'🔴'}
  const t=document.createElement('div')
  t.style.cssText='position:fixed;top:20px;right:20px;z-index:9999;background:'+( cores[tipo]||cores.info)+';color:#fff;padding:16px 20px;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.25);display:flex;gap:12px;align-items:flex-start;max-width:360px;animation:slideIn .3s ease;font-family:inherit'
  t.innerHTML='<span style="font-size:22px;flex-shrink:0">'+ic[tipo||'info']+'</span><div><div style="font-size:14px;font-weight:700;margin-bottom:3px">'+titulo+'</div><div style="font-size:12px;opacity:.9">'+( mensagem||'')+'</div></div><button onclick="this.parentNode.remove()" style="margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;flex-shrink:0">×</button>'
  if(!document.getElementById('toast-style')){const s=document.createElement('style');s.id='toast-style';s.textContent='@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}';document.head.appendChild(s)}
  document.body.appendChild(t)
  setTimeout(()=>{if(t.parentNode){t.style.animation='slideIn .3s ease reverse';setTimeout(()=>t.remove(),300)}},5000)
}

async function notificarTodos(titulo,mensagem,tipo='info'){
  // SEMPRE usar a RPC — tem security definer, retorna todos os usuários ignorando RLS
  // Fallback para query direta caso a RPC não exista ainda
  let destinatarios=[]
  const{data:rpcUsers,error:rpcErr}=await sb.rpc('get_todos_usuarios_ids')
  if(!rpcErr&&rpcUsers?.length){
    destinatarios=rpcUsers
  }else{
    // Fallback: query direta (pode ser limitada pelo RLS)
    const{data:users}=await sb.from('usuarios').select('id')
    destinatarios=users||[]
  }
  if(!destinatarios.length)return
  // Inserir em lotes de 50 para evitar timeout
  const lotes=[]
  for(let i=0;i<destinatarios.length;i+=50) lotes.push(destinatarios.slice(i,i+50))
  for(const lote of lotes){
    await sb.from('notificacoes').insert(lote.map(u=>({para_usuario:u.id,titulo,mensagem,tipo,lida:false})))
  }
  mostrarToast(titulo,mensagem,tipo)
  await carregarNotificacoes()
}

async function verificarMetas(consultorId,consultorNome,equipeId,equipeNome){
  const m=mesAtual(),a=anoAtual()
  const[metaRes,leadsRes]=await Promise.all([
    sb.from('metas_mensais').select('meta_vendas').eq('consultor_id',consultorId).eq('mes',m).eq('ano',a).maybeSingle(),
    sb.from('leads').select('valor_meta').eq('consultor_id',consultorId).eq('status','Proposta').eq('mes_fechamento',m).eq('ano_fechamento',a)
  ])
  const meta=Number(metaRes.data?.meta_vendas||17000)
  const real=(leadsRes.data||[]).reduce((s,l)=>s+Number(l.valor_meta||0),0)

  // Notificar consultor bateu meta — verificar se já existe notificação hoje para evitar duplicata
  if(real>=meta){
    const hoje=new Date().toISOString().split('T')[0]
    const tituloIndiv=`🏆 ${consultorNome} bateu a meta!`
    const{data:jaNotif}=await sb.from('notificacoes').select('id').eq('titulo',tituloIndiv).gte('criada_em',hoje+'T00:00:00').limit(1)
    if(!jaNotif?.length){
      await notificarTodos(tituloIndiv,`${consultorNome} atingiu ${fmt(real)} — meta de ${fmt(meta)}!`,'sucesso')
    }
  }

  // Checar meta da EQUIPE — usa RPC para realizado (contorna RLS) + metas_mensais para meta
  if(equipeId){
    const{data:cons}=await sb.from('usuarios').select('id').eq('equipe_id',equipeId).eq('perfil','consultor')
    if(cons?.length){
      const ids=cons.map(c=>c.id)
      const[resultEq,metasEq]=await Promise.all([
        sb.rpc('get_resultado_equipe',{p_equipe_id:equipeId,p_mes:m,p_ano:a}),
        sb.from('metas_mensais').select('meta_vendas,consultor_id').in('consultor_id',ids).eq('mes',m).eq('ano',a)
      ])
      // Realizado via RPC (passa pelo RLS — security definer no banco)
      const realTotal=Number(resultEq.data?.[0]?.realizado_total||0)
      // Meta: somar CADA consultor com fallback 17000
      const metaTotal=ids.reduce((s,cid)=>{
        const reg=(metasEq.data||[]).find(x=>x.consultor_id===cid)
        return s+Number(reg?.meta_vendas||17000)
      },0)
      // Só notifica se consolidado real atingiu o total das metas individuais
      if(metaTotal>0&&realTotal>=metaTotal){
        const hoje=new Date().toISOString().split('T')[0]
        const tituloEq=`🏆 Equipe ${equipeNome} bateu a meta!`
        const{data:jaNotifEq}=await sb.from('notificacoes').select('id').eq('titulo',tituloEq).gte('criada_em',hoje+'T00:00:00').limit(1)
        if(!jaNotifEq?.length){
          await notificarTodos(tituloEq,`A equipe ${equipeNome} atingiu ${fmt(realTotal)} de ${fmt(metaTotal)}! Parabéns a todos!`,'sucesso')
        }
      }
    }
  }
}

window.navTo=(id,btn,title)=>{
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'))

  }
  if(map[id]) map[id]()
}

async function loadCoHome(){
  const el=$('p-home');if(!el)return
  el.innerHTML='<div class="loading">Carregando...</div>'
  const m=mesAtual(),a=anoAtual()
  const DU_TOTAL=getDiasUteisDoMes(a,m)
  const DU_HOJE=getDiasUteisAte(a,m,new Date().getDate())
  const pctDU=Math.round(DU_HOJE/DU_TOTAL*100)

  const[metaRes,leadsRes,agRes,eqRes]=await Promise.all([
    sb.from('metas_mensais').select('*').eq('consultor_id',CU.id).eq('mes',m).eq('ano',a).maybeSingle(),
    sb.from('leads').select('*').eq('consultor_id',CU.id),
    sb.from('agendamentos').select('*').eq('consultor_id',CU.id).gte('data',new Date().toISOString().split('T')[0]).order('data').limit(5),
    CU.equipe_id?sb.from('equipes').select('*').eq('id',CU.equipe_id).single():{data:null}
  ])

  const metaVnd=metaRes.data?.meta_vendas||17000
  const metaCot=metaRes.data?.meta_cotacoes||70
  const leads=leadsRes.data||[]
  const hoje=new Date().toISOString().split('T')[0]
  const followHoje=leads.filter(l=>l.followup_date===hoje)
  const fechados=leads.filter(l=>l.status==='Proposta'&&l.mes_fechamento===m&&l.ano_fechamento===a)
  const realizado=fechados.reduce((s,l)=>s+Number(l.valor_meta||0),0)
  const cotacoes=leads.filter(l=>l.mes_cotacao===m&&l.ano_cotacao===a).length
  const vndPct=metaVnd>0?Math.min(Math.round(realizado/metaVnd*100),100):0
  const cotPct=metaCot>0?Math.min(Math.round(cotacoes/metaCot*100),100):0
  const vndEsp=Math.round(metaVnd*DU_HOJE/DU_TOTAL)
  const cotEsp=Math.round(metaCot*DU_HOJE/DU_TOTAL)
  const vndOk=realizado>=vndEsp,cotOk=cotacoes>=cotEsp

  // Meta da equipe — RPC contorna RLS (consultor não lê leads dos colegas diretamente)
  // Meta calculada via metas_mensais (nosso cálculo correto por consultor)
  let equipeHtml=''
  if(CU.equipe_id&&eqRes.data){
    const eq=eqRes.data
    // Buscar consultores da equipe para calcular meta total
    const{data:consEq}=await sb.from('usuarios').select('id').eq('equipe_id',CU.equipe_id).eq('perfil','consultor')
    const idsEq=(consEq||[]).map(c=>c.id)
    // RPC busca o realizado consolidado da equipe (security definer — passa pelo RLS)
    // metas_mensais busca as metas individuais (consultor pode ler todos da equipe)
    const[resultEq,metasEqRes]=await Promise.all([
      sb.rpc('get_resultado_equipe',{p_equipe_id:CU.equipe_id,p_mes:m,p_ano:a}),
      idsEq.length?sb.from('metas_mensais').select('consultor_id,meta_vendas').in('consultor_id',idsEq).eq('mes',m).eq('ano',a):{data:[]}
    ])
    // Realizado vem da RPC (contorna RLS)
    const eqRow=resultEq.data?.[0]||{realizado_total:0}
    const realEqTotal=Number(eqRow.realizado_total||0)
    // Meta calculada por consultor com fallback — não depende da coluna meta_total da RPC
    const metaEqTotal=idsEq.reduce((s,cid)=>{
      const reg=(metasEqRes.data||[]).find(x=>x.consultor_id===cid)
      return s+Number(reg?.meta_vendas||17000)
    },0)
    const eqPct=metaEqTotal>0?Math.min(Math.round(realEqTotal/metaEqTotal*100),100):0
    const eqOk=realEqTotal>=(metaEqTotal*DU_HOJE/DU_TOTAL)
    const pessoalOk=realizado>=(metaVnd*DU_HOJE/DU_TOTAL)
    const pessoalPct=metaVnd>0?Math.min(Math.round(realizado/metaVnd*100),100):0
    equipeHtml=`
      <div class="g2">
        <div class="equipe-meta-box">
          <div style="font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Minha meta pessoal</div>
          <div class="g3" style="margin-bottom:10px">
            <div style="text-align:center">
              <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Meta</div>
              <div style="font-size:18px;font-weight:800">${fmt(metaVnd)}</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">Realizado</div>
              <div style="font-size:18px;font-weight:800;color:var(--mid)">${fmt(realizado)}</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px">%</div>
              <div style="font-size:18px;font-weight:800;color:${pessoalOk?'#00C9A7':'#EF4444'}">${pessoalPct}%</div>
            </div>
          </div>
          <div class="meta-track"><div class="meta-fill" style="width:${pessoalPct}%;background:${pessoalOk?'linear-gradient(90deg,#00C9A7,#1DA4D4)':'#EF4444'}"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:6px">
            <span style="font-size:11px;color:var(--text2)">${fmt(realizado)} de ${fmt(metaVnd)}</span>
            <span style="font-size:11px;font-weight:600;color:${pessoalOk?'#059669':'#DC2626'}">${pessoalOk?'acima':'abaixo'} do esperado</span>
          </div>
        </div>
        <div style="background:linear-gradient(135deg,rgba(0,201,167,.08),rgba(37,99,235,.08));border:1.5px solid rgba(29,164,212,.2);border-radius:14px;padding:18px 20px">
          <div style="font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
            <span>Equipe ${eq.nome} — consolidado do mês</span>
            <span style="font-size:11px;color:var(--text3);font-weight:400">${idsEq.length} consultores</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
            <div style="background:rgba(255,255,255,.7);border-radius:10px;padding:14px;text-align:center">
              <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Meta vendas</div>
              <div style="font-size:20px;font-weight:800">${fmt(metaEqTotal)}</div>
            </div>
            <div style="background:rgba(255,255,255,.7);border-radius:10px;padding:14px;text-align:center">
              <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">Realizado</div>
              <div style="font-size:20px;font-weight:800;color:var(--mid)">${fmt(realEqTotal)}</div>
            </div>
            <div style="background:rgba(255,255,255,.7);border-radius:10px;padding:14px;text-align:center">
              <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">% vendas</div>
              <div style="font-size:20px;font-weight:800;color:${eqOk?'#00C9A7':'#EF4444'}">${eqPct}%</div>
            </div>
          </div>
          <div class="meta-track"><div class="meta-fill" style="width:${eqPct}%;background:${eqOk?'linear-gradient(90deg,#00C9A7,#1DA4D4)':'#EF4444'}"></div></div>
          <div style="display:flex;justify-content:space-between;margin-top:8px">
            <span style="font-size:12px;color:var(--text2)">${fmt(realEqTotal)} de ${fmt(metaEqTotal)}</span>
            <span style="font-size:12px;font-weight:600;color:${eqOk?'#059669':'#DC2626'}">${eqOk?'▲ acima':'▼ abaixo'} do esperado</span>
          </div>
        </div>
      </div>`
  }

  el.innerHTML=`
    <div style="background:linear-gradient(135deg,#E0FAF5,#EFF6FF);border:1.5px solid #93C5FD;border-radius:14px;padding:16px 20px;display:flex;align-items:flex-start;gap:14px">
      <div style="flex:1"><div style="font-size:15px;font-weight:700">Olá, ${CU.nome.split(' ')[0]}!</div>
      <div style="font-size:13px;color:#1E40AF;margin-top:3px">Dia útil <strong>${DU_HOJE}</strong> de <strong>${DU_TOTAL}</strong> — você deveria estar em <strong>${pctDU}%</strong> da meta.</div></div>
      ${followHoje.length>0?`<div style="background:#FEF3C7;border:1.5px solid #FCD34D;border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;color:#92400E;white-space:nowrap;flex-shrink:0">${followHoje.length} follow-up hoje</div>`:''}
    </div>

    <div class="metrics m4">
      <div class="metric"><div class="metric-label">Leads ativos</div><div class="metric-val">${leads.filter(l=>l.status!=='Negativa').length}</div><div class="metric-sub">${leads.length} total</div></div>
      <div class="metric"><div class="metric-label">Cotações (mês)</div><div class="metric-val">${cotacoes}</div><div class="metric-sub ${cotOk?'up':'dn'}">${cotOk?'▲':'▼'} esperado ${cotEsp}</div></div>
      <div class="metric"><div class="metric-label">Propostas (mês)</div><div class="metric-val">${fechados.length}</div><div class="metric-sub">${fmt(realizado)}</div></div>
      <div class="metric"><div class="metric-label">% da meta</div><div class="metric-val" style="color:${vndOk?'#00C9A7':'#EF4444'}">${vndPct}%</div><div class="metric-sub">${fmt(realizado)} de ${fmt(metaVnd)}</div></div>
    </div>

    ${equipeHtml}

    <div class="g2">
      <div>
        <div class="meta-bar-wrap">
          <div class="meta-bar-head">
            <div class="meta-bar-title">💰 Meta de vendas</div>
            <span class="meta-bar-pct" style="color:${vndOk?'#00C9A7':'#EF4444'}">${vndPct}%</span>
          </div>
          <div class="meta-track"><div class="meta-fill" style="width:${vndPct}%;background:${vndOk?'linear-gradient(90deg,#00C9A7,#1DA4D4)':'#EF4444'}"></div></div>
          <div class="meta-foot"><span>${fmt(realizado)} de ${fmt(metaVnd)}</span><span style="color:${vndOk?'#059669':'#DC2626'};font-weight:600">${vndOk?'▲ acima':'▼ abaixo'} do esperado (${fmt(vndEsp)})</span></div>
        </div>
        <div class="meta-bar-wrap">
          <div class="meta-bar-head">
            <div class="meta-bar-title">📋 Meta de cotações</div>
            <span class="meta-bar-pct" style="color:${cotOk?'#1DA4D4':'#EF4444'}">${cotPct}%</span>
          </div>
          <div class="meta-track"><div class="meta-fill" style="width:${cotPct}%;background:${cotOk?'linear-gradient(90deg,#1DA4D4,#2563EB)':'#EF4444'}"></div></div>
          <div class="meta-foot"><span>${cotacoes} de ${metaCot} cotações</span><span style="color:${cotOk?'#059669':'#DC2626'};font-weight:600">${cotOk?'▲':'▼'} esperado (${cotEsp})</span></div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Régua de dias úteis</span><span style="font-size:12px;color:var(--text3)">dia ${DU_HOJE} de ${DU_TOTAL}</span></div>
        <div class="du-wrap" id="du-home" style="height:60px;margin-bottom:8px"></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:14px"><span style="font-size:11px;color:var(--text3)">1</span><span style="font-size:13px;font-weight:700;color:var(--mid)">${pctDU}% do mês</span><span style="font-size:11px;color:var(--text3)">${DU_TOTAL}</span></div>
        <div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">Próximos agendamentos</div>
        ${(agRes.data||[]).length?(agRes.data||[]).map(ag=>`<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);align-items:center">
          <div style="width:32px;height:32px;border-radius:8px;background:#EFF6FF;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px">📅</div>
          <div><div style="font-size:12px;font-weight:600">${ag.titulo}</div><div style="font-size:11px;color:var(--text3)">${ag.hora?.slice(0,5)} · ${new Date(ag.data+'T12:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})}</div></div>
        </div>`).join(''):'<div class="empty" style="padding:10px 0">Nenhum agendamento próximo</div>'}
      </div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-head"><span class="card-title">Follow-up do dia</span><span class="pill p-wn">${followHoje.length} pendentes</span></div>
        ${followHoje.length?followHoje.map(l=>`<div class="row" onclick="editarLead('${l.id}')">
          <div class="av" style="width:32px;height:32px;font-size:11px;background:#FEF3C7;color:#92400E">${ini(l.nome)}</div>
          <div class="ri"><div class="rn">${l.nome}</div><div class="rm">${l.empresa||l.canal}</div></div>
          <span class="pill" style="background:${S_BG[l.status]};color:${S_CLR[l.status]}">${l.status}</span>
        </div>`).join(''):'<div class="empty">Nenhum follow-up hoje!</div>'}

  const sc={};STATUS_LEADS.forEach(s=>sc[s]=0);leads.forEach(l=>sc[l.status]=(sc[l.status]||0)+1)

}

async function loadLeads(filtroStatus='all',filtroMes=null,filtroAno=null,busca=''){
  const el=$('p-leads');if(!el)return
  el.innerHTML='<div class="loading">Carregando leads...</div>'
  let query=sb.from('leads').select('*').eq('consultor_id',CU.id).order('criado_em',{ascending:false})
  const{data}=await query
  LEADS_CACHE=data||[]
  renderLeads(LEADS_CACHE,filtroStatus,filtroMes,filtroAno,busca)
}

function renderLeads(leads,filtroStatus,filtroMes,filtroAno,busca){
  const el=$('p-leads');if(!el)return
  const m=mesAtual(),a=anoAtual()
  const fMes=filtroMes||m,fAno=filtroAno||a

  let filtrados=leads
  if(filtroStatus&&filtroStatus!=='all') filtrados=filtrados.filter(l=>l.status===filtroStatus)
  filtrados=filtrados.filter(l=>{
    const criado=new Date(l.criado_em)
    const lMes=l.mes_cotacao||criado.getMonth()+1
    const lAno=l.ano_cotacao||criado.getFullYear()
    return lMes===fMes&&lAno===fAno
  })
  if(busca) filtrados=filtrados.filter(l=>l.nome?.toLowerCase().includes(busca.toLowerCase())||l.empresa?.toLowerCase().includes(busca.toLowerCase())||l.telefone?.includes(busca))

  const meses=[]
  for(let i=0;i<12;i++){const d=new Date(a,m-1-i,1);meses.push({m:d.getMonth()+1,a:d.getFullYear()})}

  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div><div style="font-size:20px;font-weight:800">Leads</div><div style="font-size:13px;color:var(--text3)">${filtrados.length} leads encontrados</div></div>
      <button class="btn btn-pri" onclick="novoLead()">+ Novo lead</button>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <select id="filtro-mes-leads" style="height:36px;padding:0 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;background:var(--card);outline:none" onchange="onFiltroMes()">
        ${meses.map(x=>`<option value="${x.m}-${x.a}" ${x.m===fMes&&x.a===fAno?'selected':''}>${String(x.m).padStart(2,'0')}/${x.a}</option>`).join('')}
      </select>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="busca-lead" placeholder="Buscar por nome, empresa, telefone..." value="${busca}" oninput="onBuscaLead()">
      </div>
    </div>
    <div class="filter-bar" id="filter-status-bar">
      <button class="filter-btn${filtroStatus==='all'?' on':''}" onclick="setFiltroStatus('all',this)">Todos (${leads.length})</button>
      ${STATUS_LEADS.map(s=>`<button class="filter-btn${filtroStatus===s?' on':''}" onclick="setFiltroStatus('${s}',this)">${s} (${leads.filter(l=>l.status===s).length})</button>`).join('')}
    </div>
    <div class="card">
      <div style="overflow-x:auto">
      <table class="tbl">
        <thead><tr><th>Nome</th><th>Empresa</th><th>Canal</th><th>Status</th><th>Follow-up</th><th>Ações</th></tr></thead>
        <tbody>${filtrados.length?filtrados.map(l=>`<tr>
          <td><strong>${l.nome}</strong></td>
          <td>${l.empresa||'—'}</td>
          <td><span class="pill p-gray">${l.canal||'—'}</span></td>
          <td><span class="pill" style="background:${S_BG[l.status]};color:${S_CLR[l.status]}">${l.status}</span></td>

let _salvandoLead=false
window.salvarLead=async()=>{
  if(_salvandoLead)return
  _salvandoLead=true
  const id=$('ml-id').value,nome=$('ml-nome').value.trim(),status=$('ml-status').value
  $('ml-err').style.display='none'
  if(!nome){$('ml-err').textContent='Informe o nome do lead.';$('ml-err').style.display='block';_salvandoLead=false;return}
  if(status==='Negativa'&&!$('ml-motivo-sel').value){$('ml-err').textContent='Selecione o motivo da negativa.';$('ml-err').style.display='block';_salvandoLead=false;return}
  const amanha=new Date();amanha.setDate(amanha.getDate()+1)
  const m=mesAtual(),a=anoAtual()
  let motivo=$('ml-motivo-sel').value
  if(motivo==='Outro') motivo='Outro: '+($('ml-motivo-detalhe').value||'')
  let dados={nome,empresa:$('ml-empresa').value.trim(),telefone:$('ml-tel').value.trim(),canal:$('ml-canal').value,status,observacoes:$('ml-obs').value.trim(),consultor_id:CU.id,mes_cotacao:m,ano_cotacao:a,followup_date:['Proposta','Negativa'].includes(status)?null:amanha.toISOString().split('T')[0]}
  if(status==='Proposta'){const tipo=$('ml-tipo').value,op=$('ml-operadora').value,val=Number($('ml-valor').value)||0;dados={...dados,tipo,operadora:op,valor:val,valor_meta:calcMeta(val,tipo,op),vidas:Number($('ml-vidas').value)||1,mes_fechamento:m,ano_fechamento:a}}
  if(status==='Negativa') dados={...dados,motivo_perda:motivo}
  const{error}=id?await sb.from('leads').update(dados).eq('id',id):await sb.from('leads').insert(dados)
  if(error){$('ml-err').textContent='Erro: '+error.message;$('ml-err').style.display='block';return}
  if(status==='Proposta'){
    // Verificar meta individual SEMPRE, e meta da equipe se tiver equipe
    const equipeNome=CU.equipe_id?(await sb.from('equipes').select('nome').eq('id',CU.equipe_id).single()).data?.nome||'':'';
    await verificarMetas(CU.id,CU.nome,CU.equipe_id||null,equipeNome)
  }
  $('ml-ok').textContent=id?'Lead atualizado!':'Lead cadastrado!';$('ml-ok').style.display='block'
  setTimeout(()=>{closeModal('mod-lead');loadLeads();loadCoHome();_salvandoLead=false},1400)
  setTimeout(()=>{_salvandoLead=false},3000) // segurança
}

async function loadAgenda(consultorId){
  const pageId=CU.perfil==='supervisor'?'p-sv-agenda':(CU.perfil==='master'?'p-ma-agenda':'p-agenda')
  const el=$(pageId)||$('p-agenda');if(!el)return
  el.innerHTML='<div class="loading">Carregando agenda...</div>'
  const hoje=new Date(),a=hoje.getFullYear(),mm=hoje.getMonth()
  const ini=new Date(a,mm,1).toISOString().split('T')[0]
  const fim=new Date(a,mm+1,0).toISOString().split('T')[0]
  const cid=consultorId||CU.id
  const[agRes,leadsRes]=await Promise.all([
    sb.from('agendamentos').select('*').eq('consultor_id',cid).gte('data',ini).lte('data',fim).order('data'),
    sb.from('leads').select('id,nome').eq('consultor_id',cid).order('nome')
  ])
  AGENDA_EVENTS=agRes.data||[]
  const lo=$('ma-lead');if(lo){lo.innerHTML='<option value="">Nenhum</option>'+(leadsRes.data||[]).map(l=>`<option value="${l.id}">${l.nome}</option>`).join('')}
  $('ma-consultor-id').value=cid
  const ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
  const pd=new Date(a,mm,1).getDay(),td=new Date(a,mm+1,0).getDate()
  let cal=ds.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:6px 0;text-transform:uppercase">${d}</div>`).join('')
  for(let i=0;i<pd;i++) cal+=`<div></div>`
  for(let d=1;d<=td;d++){
    const ds2=`${a}-${String(mm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const isT=d===hoje.getDate()&&mm===hoje.getMonth()
    const evs=AGENDA_EVENTS.filter(e=>e.data===ds2)
    cal+=`<div class="agenda-day${isT?' today':''}" onclick="diaSel('${ds2}','${cid}')">
      <div class="agenda-day-num">${d}</div>
      ${evs.slice(0,2).map(e=>`<div class="agenda-event">${e.hora?.slice(0,5)} ${e.titulo}</div>`).join('')}
      ${evs.length>2?`<div style="font-size:9px;color:var(--text3)">+${evs.length-2}</div>`:''}
    </div>`
  }
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:20px;font-weight:800;text-transform:capitalize">${hoje.toLocaleString('pt-BR',{month:'long',year:'numeric'})}</div>
      <button class="btn btn-pri" onclick="novoAg('${cid}')">+ Novo agendamento</button>
    </div>
    <div class="card"><div class="agenda-cal">${cal}</div></div>
    <div class="card">
      <div class="card-head"><span class="card-title">Próximos agendamentos</span></div>
      ${AGENDA_EVENTS.filter(e=>e.data>=hoje.toISOString().split('T')[0]).slice(0,10).map(e=>`
        <div class="row">
          <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--teal),var(--mid));display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:13px;font-weight:800;color:#fff;line-height:1">${new Date(e.data+'T12:00').getDate()}</span>
            <span style="font-size:9px;color:rgba(255,255,255,.8);text-transform:uppercase">${new Date(e.data+'T12:00').toLocaleString('pt-BR',{month:'short'})}</span>
          </div>
          <div class="ri"><div class="rn">${e.titulo}</div><div class="rm">${e.hora?.slice(0,5)} · ${e.tipo}</div></div>
          <button class="btn btn-danger btn-sm" onclick="excluirAg('${e.id}','${cid}')">Excluir</button>
        </div>`).join('')||'<div class="empty">Nenhum agendamento futuro</div>'}
    </div>
  `
}

window.diaSel=(date,cid)=>{
  const evs=AGENDA_EVENTS.filter(e=>e.data===date)
  if(evs.length){alert(evs.map(e=>`${e.hora?.slice(0,5)} — ${e.titulo} (${e.tipo})`).join('\n'))}

async function getConsEq(){
  const{data}=await sb.from('usuarios').select('*').eq('equipe_id',CU.equipe_id).eq('perfil','consultor').order('nome')
  return data||[]
}

async function loadSvHome(){
  const el=$('p-sv-home');if(!el)return
  el.innerHTML='<div class="loading">Carregando...</div>'
  const m=mesAtual(),a=anoAtual()
  const DU_TOTAL=getDiasUteisDoMes(a,m)
  const DU_HOJE=getDiasUteisAte(a,m,new Date().getDate())
  const pctDU=Math.round(DU_HOJE/DU_TOTAL*100)
  const cons=await getConsEq()
  const ids=cons.map(c=>c.id)
  const[leadsRes,metasRes,eqRes]=await Promise.all([
    ids.length?sb.from('leads').select('*').in('consultor_id',ids):{data:[]},
    ids.length?sb.from('metas_mensais').select('*').in('consultor_id',ids).eq('mes',m).eq('ano',a):{data:[]},
    sb.from('equipes').select('*').eq('id',CU.equipe_id).single()
  ])
  const leads=leadsRes.data||[]
  const fechados=leads.filter(l=>l.status==='Proposta'&&l.mes_fechamento===m&&l.ano_fechamento===a)
  const receitaEq=fechados.reduce((s,l)=>s+Number(l.valor_meta||0),0)
  const cotacoesEq=leads.filter(l=>l.mes_cotacao===m&&l.ano_cotacao===a).length
  // Soma meta de CADA consultor com fallback — consistente com verificarMetas e loadCoHome
  const metasTotal=ids.reduce((s,cid)=>{
    const reg=(metasRes.data||[]).find(x=>x.consultor_id===cid)
    return s+Number(reg?.meta_vendas||17000)
  },0)
  const metaCotTotal=(metasRes.data||[]).reduce((s,x)=>s+Number(x.meta_cotacoes||70),0)||cons.length*70
  const eqPct=metasTotal>0?Math.round(receitaEq/metasTotal*100):0
  const cotPct=metaCotTotal>0?Math.round(cotacoesEq/metaCotTotal*100):0
  const eqOk=receitaEq>=(metasTotal*DU_HOJE/DU_TOTAL)

  const consStats=cons.map(c=>{
    const meta=(metasRes.data||[]).find(x=>x.consultor_id===c.id)||{meta_vendas:17000,meta_cotacoes:70}
    const real=fechados.filter(l=>l.consultor_id===c.id).reduce((s,l)=>s+Number(l.valor_meta||0),0)
    const cots=leads.filter(l=>l.consultor_id===c.id&&l.mes_cotacao===m&&l.ano_cotacao===a).length
    const pct=meta.meta_vendas>0?Math.round(real/meta.meta_vendas*100):0
    const st=pct>=pctDU?'ok':pct>=(pctDU*0.6)?'wn':'lw'
    return{c,meta,real,cots,pct,st}
  })

  el.innerHTML=`
    <div class="equipe-meta-box" style="margin-bottom:4px">
      <div style="font-size:13px;font-weight:700;margin-bottom:12px">Equipe ${eqRes.data?.nome||''} — consolidado do mês</div>
      <div class="metrics m4" style="margin-bottom:12px">
        <div style="background:rgba(255,255,255,.6);border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Meta vendas</div><div style="font-size:18px;font-weight:800">${fmt(metasTotal)}</div></div>
        <div style="background:rgba(255,255,255,.6);border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Realizado</div><div style="font-size:18px;font-weight:800;color:var(--mid)">${fmt(receitaEq)}</div></div>
        <div style="background:rgba(255,255,255,.6);border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">% vendas</div><div style="font-size:18px;font-weight:800;color:${eqOk?'#00C9A7':'#EF4444'}">${eqPct}%</div></div>
        <div style="background:rgba(255,255,255,.6);border-radius:10px;padding:12px;text-align:center"><div style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Cotações</div><div style="font-size:18px;font-weight:800;color:var(--blue)">${cotacoesEq}/${metaCotTotal} <span style="font-size:13px">(${cotPct}%)</span></div></div>
      </div>
      <div class="meta-track"><div class="meta-fill" style="width:${Math.min(eqPct,100)}%;background:${eqOk?'linear-gradient(90deg,#00C9A7,#1DA4D4)':'#EF4444'}"></div></div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Desempenho por consultor</span><span style="font-size:12px;color:var(--text3)">esperado: ${pctDU}% · dia útil ${DU_HOJE}/${DU_TOTAL}</span></div>
      ${consStats.map(({c,meta,real,cots,pct,st})=>`
        <div class="row" style="cursor:pointer" onclick="abrirConsultor('${c.id}','${c.nome.replace(/'/g,"\\'")}')">
          <div class="av" style="width:36px;height:36px;font-size:12px;background:#E0FAF5;color:#065F46">${ini(c.nome)}</div>
          <div class="ri">
            <div class="rn">${c.nome}</div>
            <div class="rm">${fmt(real)} · cotações: ${cots}/${meta.meta_cotacoes}</div>
          </div>
          <div class="pw">
            <div class="pl"><span style="font-size:11px;color:var(--text2)">Vendas</span><span style="font-size:12px;font-weight:700;color:${st==='ok'?'#00C9A7':st==='wn'?'#F59E0B':'#EF4444'}">${pct}%</span></div>
            <div class="pt"><div class="pf" style="width:${Math.min(pct,100)}%;background:${st==='ok'?'linear-gradient(90deg,#00C9A7,#1DA4D4)':st==='wn'?'#F59E0B':'#EF4444'}"></div></div>
          </div>
          <span class="pill ${st==='ok'?'p-ok':st==='wn'?'p-wn':'p-lw'}">${st==='ok'?'No prazo':st==='wn'?'Atenção':'Abaixo'}</span>
        </div>`).join('')}
    </div>
    <div class="g2">
      <div class="card">
        <div class="card-head"><span class="card-title">Leads por status</span></div>
        <div style="position:relative;height:200px"><canvas id="c-sv-status"></canvas></div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Receita por consultor</span></div>
        <div style="position:relative;height:200px"><canvas id="c-sv-rv"></canvas></div>
      </div>
    </div>
  `
  const sc={};STATUS_LEADS.forEach(s=>sc[s]=0);leads.forEach(l=>sc[l.status]=(sc[l.status]||0)+1)
  const sl=Object.keys(sc).filter(s=>sc[s]>0)
  const cores=['#00C9A7','#1DA4D4','#2563EB','#8B5CF6','#F59E0B']
  setTimeout(()=>{
    newChart('c-sv-status',{type:'doughnut',data:{labels:sl,datasets:[{data:sl.map(s=>sc[s]),backgroundColor:sl.map(s=>S_BG[s]),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}})
    newChart('c-sv-rv',{type:'bar',data:{labels:consStats.map(x=>x.c.nome.split(' ')[0]),datasets:[{data:consStats.map(x=>x.real),backgroundColor:cores,borderRadius:8,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'R$ '+c.raw.toLocaleString('pt-BR')}}},scales:{x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94A3B8',font:{size:11},callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}}}}})
  },100)
}

window.salvarMetaCons=async id=>{
  const mvEl=$(`mv-${id}`),mcEl=$(`mc-${id}`)
  if(!mvEl){mostrarToast('Erro','Campo não encontrado: mv-'+id,'urgente');return}
  const mv=Number(mvEl.value)||17000,mc=Number(mcEl?.value)||70
  const m=mesAtual(),a=anoAtual()
  console.log('salvarMetaCons',{id,mv,mc,m,a})
  try{
    // Upsert direto — banco confirma que funciona com perfil supervisor
    const{data,error}=await sb.from('metas_mensais')
      .upsert({consultor_id:id,mes:m,ano:a,meta_vendas:mv,meta_cotacoes:mc},{onConflict:'consultor_id,mes,ano'})
      .select()
    console.log('upsert result:',{data,error})
    if(error)throw error
    // Atualizar campo padrão do usuário
    await sb.from('usuarios').update({meta_vendas:mv,meta_cotacoes:mc}).eq('id',id)
    mostrarToast('Meta salva!',`${fmt(mv)} de vendas e ${mc} cotações`,'sucesso')
    setTimeout(()=>loadSvHome(),1500)
  }catch(e){
    mostrarToast('Erro ao salvar',''+e.message,'urgente')
    console.error('salvarMetaCons erro:',e)
  }
}

          <td><input type="number" id="pr-${x.m}-${x.a}" value="${p.realizado}" style="width:120px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit"></td>
          <td>${p.meta>0?`<span class="pill ${pct>=100?'p-ok':pct>=64?'p-wn':'p-lw'}">${pct}%</span>`:'—'}</td>
          <td><input type="text" id="po-${x.m}-${x.a}" value="${p.observacao||''}" style="width:120px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit" placeholder="Obs..."></td>

        </tr>`}).join('')}
      </tbody>
    </table></div>
  `
}
window.salvarProv=async(m,a)=>{
  const meta=Number($(`pm-${m}-${a}`).value)||0
  const realizado=Number($(`pr-${m}-${a}`).value)||0
  const obs=$(`po-${m}-${a}`)?.value||''
  try{
    const{error}=await sb.from('provisionamentos').upsert(
      {equipe_id:CU.equipe_id,mes:m,ano:a,meta,realizado,observacao:obs,atualizado_em:new Date().toISOString()},
      {onConflict:'equipe_id,mes,ano'}
    )
    if(error)throw error
    mostrarToast('Provisionamento salvo!',`${String(m).padStart(2,'0')}/${a} — ${fmt(meta)} meta · ${fmt(realizado)} realizado`,'sucesso')
    // Recarregar para atualizar o %
    setTimeout(()=>loadSvProv(),800)
  }catch(e){
    mostrarToast('Erro ao salvar','Verifique suas permissões: '+e.message,'urgente')
    console.error('salvarProv:',e)
  }
}

  const cons=await getConsEq()
  const ids=cons.map(c=>c.id)

  </table></div>`
}

async function loadMaHome(){
  const el=$('p-ma-home');if(!el)return
  el.innerHTML='<div class="loading">Carregando visão master...</div>'
  const m=mesAtual(),a=anoAtual()
  const DU_TOTAL=getDiasUteisDoMes(a,m)
  const DU_HOJE=getDiasUteisAte(a,m,new Date().getDate())
  const pctDU=Math.round(DU_HOJE/DU_TOTAL*100)

  // Buscar equipes e supervisores sem duplicação
  const[eqRes,svRes,consRes,leadsRes]=await Promise.all([
    sb.from('equipes').select('*').order('nome'),
    sb.from('usuarios').select('id,nome,equipe_id').eq('perfil','supervisor'),
    sb.from('usuarios').select('id,equipe_id').eq('perfil','consultor'),
    sb.from('leads').select('valor_meta,status,consultor_id,mes_fechamento,ano_fechamento')
  ])

  // Deduplicar equipes por ID para evitar duplicação no dashboard
  const equipesMapa={}
  ;(eqRes.data||[]).forEach(e=>{equipesMapa[e.id]=e})
  const equipes=Object.values(equipesMapa)
  const svMap={}; // equipe_id → supervisor (apenas 1 por equipe)
  ;(svRes.data||[]).forEach(s=>{if(s.equipe_id&&!svMap[s.equipe_id]) svMap[s.equipe_id]=s})
  const cons=consRes.data||[]
  const leads=leadsRes.data||[]
  const fechados=leads.filter(l=>l.status==='Proposta'&&l.mes_fechamento===m&&l.ano_fechamento===a)
  const receitaTotal=fechados.reduce((s,l)=>s+Number(l.valor_meta||0),0)

  // Stats por equipe — usando equipe_id único, sem duplicar
  const eqStats=await Promise.all(equipes.map(async eq=>{
    const consEq=cons.filter(c=>c.equipe_id===eq.id)
    const idsEq=consEq.map(c=>c.id)
    const real=fechados.filter(l=>idsEq.includes(l.consultor_id)).reduce((s,l)=>s+Number(l.valor_meta||0),0)
    const{data:metasEq}=idsEq.length?await sb.from('metas_mensais').select('meta_vendas,consultor_id').in('consultor_id',idsEq).eq('mes',m).eq('ano',a):{data:[]}
    // Soma meta individual de cada consultor (igual ao supervisor)
    const metaTotal=idsEq.reduce((s,cid)=>{
      const mc=(metasEq||[]).find(x=>x.consultor_id===cid)
      return s+Number(mc?.meta_vendas||17000)
    },0)
    const pct=metaTotal>0?Math.round(real/metaTotal*100):0
    const st=pct>=pctDU?'ok':pct>=(pctDU*0.6)?'wn':'lw'
    const sv=svMap[eq.id]
    return{eq,real,metaTotal,pct,st,nCons:consEq.length,sv}
  }))

  const cores=['#00C9A7','#1DA4D4','#2563EB','#8B5CF6','#F59E0B']
  el.innerHTML=`
    <div style="background:linear-gradient(135deg,#E0FAF5,#EFF6FF);border:1.5px solid #93C5FD;border-radius:14px;padding:16px 20px;margin-bottom:4px">
      <div style="font-size:15px;font-weight:700">Painel Master — visão consolidada</div>
      <div style="font-size:13px;color:#1E40AF;margin-top:3px">${equipes.length} equipes · ${cons.length} consultores · ${new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'})}</div>
    </div>
    <div class="metrics m4">
      <div class="metric"><div class="metric-label">Equipes</div><div class="metric-val">${equipes.length}</div></div>
      <div class="metric"><div class="metric-label">Consultores</div><div class="metric-val">${cons.length}</div></div>
      <div class="metric"><div class="metric-label">Propostas (mês)</div><div class="metric-val">${fechados.length}</div></div>
      <div class="metric"><div class="metric-label">Receita total</div><div class="metric-val" style="font-size:20px">${fmt(receitaTotal)}</div></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-title">Desempenho por equipe</span><span style="font-size:12px;color:var(--text3)">esperado: ${pctDU}% · dia útil ${DU_HOJE}/${DU_TOTAL}</span></div>
      <table class="tbl">
        <thead><tr><th>Equipe</th><th>Supervisor</th><th>Consultores</th><th>Meta</th><th>Realizado</th><th>%</th><th>Status</th></tr></thead>
        <tbody>${eqStats.map(({eq,real,metaTotal,pct,st,nCons,sv},i)=>`<tr>
          <td><div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${cores[i%cores.length]}"></div><strong>${eq.nome}</strong></div></td>
          <td>${sv?.nome||'—'}</td>
          <td>${nCons}</td>
          <td>${fmt(metaTotal)}</td>
          <td style="font-weight:700;color:var(--mid)">${fmt(real)}</td>
          <td><span class="pill ${st==='ok'?'p-ok':st==='wn'?'p-wn':'p-lw'}">${pct}%</span></td>
          <td><span class="pill ${st==='ok'?'p-ok':st==='wn'?'p-wn':'p-lw'}">${st==='ok'?'No prazo':st==='wn'?'Atenção':'Abaixo'}</span></td>
        </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="g2">
      <div class="card"><div class="card-head"><span class="card-title">% por equipe</span></div><div style="position:relative;height:200px"><canvas id="c-ma-perf"></canvas></div></div>
      <div class="card"><div class="card-head"><span class="card-title">Receita por equipe</span></div><div style="position:relative;height:200px"><canvas id="c-ma-rv"></canvas></div></div>
    </div>
  `
  setTimeout(()=>{
    newChart('c-ma-perf',{type:'bar',data:{labels:eqStats.map(e=>e.eq.nome),datasets:[{label:'Realizado',data:eqStats.map(e=>e.pct),backgroundColor:cores,borderRadius:8,barPercentage:.4},{label:'Esperado',data:eqStats.map(()=>pctDU),backgroundColor:'#E2E8F0',borderRadius:8,barPercentage:.4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94A3B8',font:{size:10},callback:v=>v+'%'},max:100}}}})
    newChart('c-ma-rv',{type:'bar',data:{labels:eqStats.map(e=>e.eq.nome),datasets:[{data:eqStats.map(e=>e.real),backgroundColor:cores,borderRadius:8,barPercentage:.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'R$ '+c.raw.toLocaleString('pt-BR')}}},scales:{x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94A3B8',font:{size:10},callback:v=>'R$ '+(v/1000).toFixed(0)+'k'}}}}})
  },100)
}

window.loadMaHistAno=async(a,btn)=>{

  const[eqRes,leadsRes,consRes]=await Promise.all([
    sb.from('equipes').select('*').order('nome'),
    sb.from('leads').select('valor_meta,consultor_id,mes_fechamento,status').eq('status','Proposta').eq('ano_fechamento',a),

  ])
  const equipes=eqRes.data||[];const leads=leadsRes.data||[];const cons=consRes.data||[]

        const real=leads.filter(l=>idsEq.includes(l.consultor_id)&&l.mes_fechamento===m).reduce((s,l)=>s+Number(l.valor_meta||0),0)
        return real
      })
      const total=cells.reduce((s,c)=>s+c,0)
      return`<tr><td><strong>${String(m).padStart(2,'0')}/${a}</strong></td>

        <td><strong style="color:var(--mid)">${fmt(total)}</strong></td>
      </tr>`}).join('')}
    </tbody>
  </table></div>`
}

  const{data:leadsAll}=await sb.from('leads').select('operadora,valor_meta,vidas').eq('status','Proposta')
  const operadoras=['Clinipam','Unimed','Amil','Nossa Saude','PR Clinicas','SulAmerica','MedSenior','MedSul','Qualicorp','Bradesco','Select']
  
  // Agrupa por operadora
  const mesAtl={}

        <div style="margin-top:14px">

async function loadSvEngajamento(){
  const el=$('p-sv-engajamento');if(!el)return
  el.innerHTML='<div class="loading">Carregando engajamento...</div>'
  const m=mesAtual(),a=anoAtual()
  const cons=await getConsEq()
  const ids=cons.map(c=>c.id)
  if(!ids.length){el.innerHTML='<div class="empty">Nenhum consultor na equipe</div>';return}

  const[leadsRes,histRes,agRes]=await Promise.all([
    sb.from('leads').select('consultor_id,criado_em,status,followup_date').in('consultor_id',ids),
    sb.from('historico_leads').select('consultor_id,criado_em').in('consultor_id',ids),
    sb.from('agendamentos').select('consultor_id,criado_em').in('consultor_id',ids)
  ])

  const leads=leadsRes.data||[]
  const hist=histRes.data||[]
  const hoje=new Date().toISOString().split('T')[0]
  const inicioMes=new Date(a,m-1,1).toISOString()

  const stats=cons.map(c=>{
    const mLeads=leads.filter(l=>l.consultor_id===c.id&&l.criado_em>=inicioMes)
    const mHist=hist.filter(h=>h.consultor_id===c.id&&h.criado_em>=inicioMes)
    const followHoje=leads.filter(l=>l.consultor_id===c.id&&l.followup_date===hoje).length
    const negativas=leads.filter(l=>l.consultor_id===c.id&&l.status==='Negativa'&&l.criado_em>=inicioMes).length
    const propostas=leads.filter(l=>l.consultor_id===c.id&&l.status==='Proposta'&&l.criado_em>=inicioMes).length

    // Última atividade (lead ou interação mais recente)
    const atividades=[
      ...mLeads.map(l=>l.criado_em),
      ...mHist.map(h=>h.criado_em)
    ].sort().reverse()
    const ultimaAtiv=atividades[0]
    let diasSemAtiv=999
    if(ultimaAtiv){
      const diff=new Date()-new Date(ultimaAtiv)
      diasSemAtiv=Math.floor(diff/86400000)
    }

    // Status de engajamento
    let status,cor,emoji
    if(diasSemAtiv===0){status='Ativo hoje';cor='#00C9A7';emoji='🟢'}
    else if(diasSemAtiv<=2){status='Ativo recente';cor='#10B981';emoji='🟢'}
    else if(diasSemAtiv<=5){status='Pouco ativo';cor='#F59E0B';emoji='🟡'}
    else if(diasSemAtiv<=10){status='Inativo';cor='#F97316';emoji='🔴'}
    else{status='Sem atividade';cor='#EF4444';emoji='🔴'}

    return{c,mLeads:mLeads.length,mHist:mHist.length,followHoje,negativas,propostas,ultimaAtiv,diasSemAtiv,status,cor,emoji}
  }).sort((a,b)=>a.diasSemAtiv-b.diasSemAtiv)

  const ativos=stats.filter(s=>s.diasSemAtiv<=2).length
  const poucoAtivos=stats.filter(s=>s.diasSemAtiv>2&&s.diasSemAtiv<=5).length
  const inativos=stats.filter(s=>s.diasSemAtiv>5).length

  el.innerHTML=`
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">Engajamento da equipe</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:20px">Baseado em atividade real — leads, interações e follow-ups</div>

    <div class="metrics m3">
      <div class="metric">
        <div class="metric-label">Ativos</div>
        <div class="metric-val" style="color:#00C9A7">${ativos}</div>
        <div class="metric-sub">última atividade ≤ 2 dias</div>
      </div>
      <div class="metric">
        <div class="metric-label">Pouco ativos</div>
        <div class="metric-val" style="color:#F59E0B">${poucoAtivos}</div>
        <div class="metric-sub">3 a 5 dias sem atividade</div>
      </div>
      <div class="metric">
        <div class="metric-label">Inativos</div>
        <div class="metric-val" style="color:#EF4444">${inativos}</div>
        <div class="metric-sub">mais de 5 dias sem atividade</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Atividade por consultor — ${new Date().toLocaleString('pt-BR',{month:'long'})}</span></div>
      <div style="overflow-x:auto">
        <table class="tbl">
          <thead><tr>
            <th>Consultor</th><th>Status</th><th>Última atividade</th>
            <th>Leads (mês)</th><th>Interações (mês)</th>
            <th>Propostas</th><th>Negativas</th><th>Follow-up hoje</th>
          </tr></thead>
          <tbody>${stats.map(s=>`<tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div class="av" style="width:32px;height:32px;font-size:11px;background:#E0FAF5;color:#065F46;flex-shrink:0">${ini(s.c.nome)}</div>
                <div><div style="font-weight:600">${s.c.nome}</div><div style="font-size:11px;color:var(--text3)">${s.c.email}</div></div>
              </div>
            </td>
            <td>
              <span style="display:inline-flex;align-items:center;gap:5px;background:${s.cor}18;color:${s.cor};padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap">
                ${s.emoji} ${s.status}
              </span>
            </td>
            <td>
              ${s.ultimaAtiv
                ?`<div style="font-size:12px;font-weight:600">${new Date(s.ultimaAtiv).toLocaleDateString('pt-BR')}</div>
                  <div style="font-size:11px;color:var(--text3)">${s.diasSemAtiv===0?'hoje':s.diasSemAtiv===1?'ontem':s.diasSemAtiv+' dias atrás'}</div>`
                :'<span style="font-size:12px;color:var(--text3)">Sem registro</span>'}
            </td>
            <td><span style="font-weight:700;font-size:15px">${s.mLeads}</span></td>
            <td><span style="font-weight:700;font-size:15px">${s.mHist}</span></td>
            <td><span class="pill p-ok">${s.propostas}</span></td>
            <td><span class="pill p-lw">${s.negativas}</span></td>
            <td>
              ${s.followHoje>0
                ?`<span class="pill p-wn">${s.followHoje} pendentes</span>`
                :'<span style="font-size:12px;color:var(--text3)">—</span>'}
            </td>
          </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-head"><span class="card-title">Leads cadastrados por consultor</span></div>
        <div style="position:relative;height:220px"><canvas id="c-sv-eng-leads"></canvas></div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Interações registradas por consultor</span></div>
        <div style="position:relative;height:220px"><canvas id="c-sv-eng-hist"></canvas></div>
      </div>
    </div>
  `
  const cores=stats.map(s=>s.diasSemAtiv<=2?'#00C9A7':s.diasSemAtiv<=5?'#F59E0B':'#EF4444')
  setTimeout(()=>{
    newChart('c-sv-eng-leads',{type:'bar',data:{labels:stats.map(s=>s.c.nome.split(' ')[0]),datasets:[{data:stats.map(s=>s.mLeads),backgroundColor:cores,borderRadius:8,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94A3B8',font:{size:11}}}}}})
    newChart('c-sv-eng-hist',{type:'bar',data:{labels:stats.map(s=>s.c.nome.split(' ')[0]),datasets:[{data:stats.map(s=>s.mHist),backgroundColor:cores,borderRadius:8,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94A3B8',font:{size:11}}}}}})
  },150)
}

// ════════════════════════════════════════
// MASTER — RECUSAS CONSOLIDADAS
// ════════════════════════════════════════
async function loadMaRecusas(){
  const el=$('p-ma-recusas');if(!el)return
  el.innerHTML='<div class="loading">Carregando recusas...</div>'
  const m=mesAtual(),a=anoAtual()
  const[eqRes,leadsRes]=await Promise.all([
    sb.from('equipes').select('*').order('nome'),
    sb.from('leads').select('*,usuarios(nome,equipe_id)').eq('status','Negativa').order('criado_em',{ascending:false})
  ])
  const equipes=eqRes.data||[]
  const leads=leadsRes.data||[]
  const leadsMes=leads.filter(l=>l.mes_cotacao===m&&l.ano_cotacao===a)
  const cores=['#EF4444','#F59E0B','#8B5CF6','#1DA4D4','#10B981','#F97316','#EC4899','#6366F1','#94A3B8']

  function agruparMotivos(arr){
    const map={}
    arr.forEach(l=>{
      let motivo=l.motivo_perda||'Sem motivo'
      if(motivo.startsWith('Outro:')) motivo='Outro'
      map[motivo]=(map[motivo]||0)+1
    })
    return Object.entries(map).sort((a,b)=>b[1]-a[1])
  }

  const motivosGeral=agruparMotivos(leadsMes)
  const totalMes=leadsMes.length

  // Stats por equipe
  const{data:cons}=await sb.from('usuarios').select('id,nome,equipe_id').eq('perfil','consultor')
  const eqStats=equipes.map(eq=>{
    const idsEq=(cons||[]).filter(c=>c.equipe_id===eq.id).map(c=>c.id)
    const leadsEq=leadsMes.filter(l=>idsEq.includes(l.consultor_id))
    const motivos=agruparMotivos(leadsEq)
    return{eq,total:leadsEq.length,principal:motivos[0]?.[0]||'—',motivos}
  }).sort((a,b)=>b.total-a.total)

  el.innerHTML=`
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">Análise de recusas — consolidado</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:20px">${new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'})}</div>

    <div class="metrics m4">
      <div class="metric"><div class="metric-label">Negativas (mês)</div><div class="metric-val" style="color:#EF4444">${totalMes}</div></div>
      <div class="metric"><div class="metric-label">Principal motivo</div><div class="metric-val" style="font-size:16px">${motivosGeral[0]?.[0]||'—'}</div><div class="metric-sub">${motivosGeral[0]?.[1]||0} casos</div></div>
      <div class="metric"><div class="metric-label">Total acumulado</div><div class="metric-val">${leads.length}</div></div>
      <div class="metric"><div class="metric-label">Equipe mais negativas</div><div class="metric-val" style="font-size:16px">${eqStats[0]?.eq.nome||'—'}</div><div class="metric-sub">${eqStats[0]?.total||0} este mês</div></div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-head"><span class="card-title">Motivos consolidados — este mês</span></div>
        ${motivosGeral.length?`<div style="position:relative;height:220px"><canvas id="c-ma-rec-pie"></canvas></div>`:'<div class="empty">Nenhuma negativa este mês</div>'}
        <div style="margin-top:14px">
          ${motivosGeral.map(([mot,cnt],i)=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
            <div style="width:10px;height:10px;border-radius:50%;background:${cores[i%cores.length]};flex-shrink:0"></div>
            <span style="flex:1;font-size:13px">${mot}</span>
            <span style="font-weight:700">${cnt}</span>
            <span style="font-size:11px;color:var(--text3)">${totalMes>0?Math.round(cnt/totalMes*100):0}%</span>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="card-title">Negativas por equipe</span></div>
        ${eqStats.some(e=>e.total>0)?`<div style="position:relative;height:220px"><canvas id="c-ma-rec-eq"></canvas></div>`:'<div class="empty">Nenhuma negativa este mês</div>'}
        <div style="margin-top:14px">
          ${eqStats.map((e,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">
            <div style="width:10px;height:10px;border-radius:50%;background:${cores[i%cores.length]};flex-shrink:0"></div>
            <span style="flex:1;font-size:13px">${e.eq.nome}</span>
            <span style="font-weight:700">${e.total}</span>
            <span style="font-size:11px;color:var(--text3)">${e.principal}</span>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span class="card-title">Negativas por equipe — detalhamento</span></div>
      <div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>Equipe</th><th>Total (mês)</th><th>Principal motivo</th><th>2º motivo</th><th>Acumulado</th></tr></thead>
        <tbody>${eqStats.map((e,i)=>{
          const acum=leads.filter(l=>{
            const idsEq=(cons||[]).filter(c=>c.equipe_id===e.eq.id).map(c=>c.id)
            return idsEq.includes(l.consultor_id)
          }).length
          return`<tr>
            <td><div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:${cores[i%cores.length]}"></div><strong>${e.eq.nome}</strong></div></td>
            <td><span style="font-weight:700;color:#EF4444">${e.total}</span></td>
            <td>${e.motivos[0]?`<span class="pill p-lw">${e.motivos[0][0]}</span>`:'—'}</td>
            <td>${e.motivos[1]?`<span class="pill p-wn">${e.motivos[1][0]}</span>`:'—'}</td>
            <td><span style="font-size:12px;color:var(--text3)">${acum} total</span></td>
          </tr>`}).join('')}
        </tbody>
      </table></div>
    </div>

    <div class="card">
      <div class="card-head">
        <span class="card-title">Todos os leads negados este mês</span>
        <span class="pill p-lw">${totalMes} leads</span>
      </div>
      <div style="overflow-x:auto"><table class="tbl">
        <thead><tr><th>Lead</th><th>Consultor</th><th>Equipe</th><th>Motivo</th><th>Data</th><th>Observação</th></tr></thead>
        <tbody>${leadsMes.length?leadsMes.map(l=>{
          const eq=equipes.find(e=>{
            const idsEq=(cons||[]).filter(c=>c.equipe_id===e.id).map(c=>c.id)
            return idsEq.includes(l.consultor_id)
          })
          return`<tr>
            <td><strong>${l.nome}</strong>${l.empresa?`<div style="font-size:11px;color:var(--text3)">${l.empresa}</div>`:''}</td>
            <td>${l.usuarios?.nome?.split(' ')[0]||'—'}</td>
            <td>${eq?.nome||'—'}</td>
            <td><span class="pill p-lw">${l.motivo_perda?.startsWith('Outro:')?'Outro':l.motivo_perda||'—'}</span></td>
            <td style="font-size:12px;color:var(--text3)">${new Date(l.criado_em).toLocaleDateString('pt-BR')}</td>
            <td style="font-size:12px;color:var(--text2);max-width:200px">${l.motivo_perda?.startsWith('Outro:')?l.motivo_perda.replace('Outro:','').trim():l.observacoes||'—'}</td>
          </tr>`}).join(''):'<tr><td colspan="6"><div class="empty">Nenhuma negativa este mês</div></td></tr>'}
        </tbody>
      </table></div>
    </div>
  `
  setTimeout(()=>{
    if(motivosGeral.length) newChart('c-ma-rec-pie',{type:'doughnut',data:{labels:motivosGeral.map(([m])=>m),datasets:[{data:motivosGeral.map(([,c])=>c),backgroundColor:motivosGeral.map((_,i)=>cores[i%cores.length]),borderWidth:2,borderColor:'#fff',hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.label+': '+c.raw}}}}})
    if(eqStats.some(e=>e.total>0)) newChart('c-ma-rec-eq',{type:'bar',data:{labels:eqStats.map(e=>e.eq.nome),datasets:[{data:eqStats.map(e=>e.total),backgroundColor:eqStats.map((_,i)=>cores[i%cores.length]),borderRadius:8,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:11}}},y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{color:'#94A3B8',font:{size:11},stepSize:1}}}}})
  },150)
}
window.salvarMetaEq=async id=>{
  const val=Number($(`meq-${id}`).value)||0
  try{
    const{error}=await sb.from('equipes').update({meta_mensal:val}).eq('id',id)
    if(error)throw error
    mostrarToast('Meta da equipe salva!',fmt(val)+' por mês','sucesso')
  }catch(e){alert('Erro: '+e.message)}
}
</script>
<div class="mob-overlay" id="mob-overlay" onclick="closeSidebar()"></div>

<script>
function toggleSidebar(){
  const sb=document.getElementById('sidebar')
  const ov=document.getElementById('mob-overlay')
  const isOpen=sb.classList.contains('mob-open')
  if(isOpen){closeSidebar()}else{sb.classList.add('mob-open');ov.classList.add('active');document.body.style.overflow='hidden'}
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('mob-open')
  document.getElementById('mob-overlay').classList.remove('active')
  document.body.style.overflow=''
}
// Fechar sidebar ao navegar em mobile
const origNavTo=window.navTo
window.navTo=function(id,btn,title){
  if(window.innerWidth<=900) closeSidebar()
  origNavTo(id,btn,title)
}
</script>
